function enemyShoot(enemy) {
  let target = getClosestLivingPlayer(enemy.x, enemy.y);
  if (!target) return;
  let dx = target.x - enemy.x;
  let dy = (target.y + target.h / 2) - (enemy.y + enemy.h / 2);
  let dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0) return;
  let speed = enemy.bulletSpeed;
  SFX.enemyShoot();
  bullets.push({
    x: enemy.x + enemy.facing * 15,
    y: enemy.y + enemy.h / 2 - 4,
    vx: (dx / dist) * speed,
    vy: (dy / dist) * speed,
    damage: 1,
    color: enemy.color,
    size: 3,
    isPlayer: false,
    life: 120,
    trail: [],
  });
}

// ─── HELPERS ───
function getClosestLivingPlayer(x, y) {
  let players = [player];
  if (player2) players.push(player2);
  players = players.filter(p => p && p.alive);
  if (players.length === 0) return player; // fallback
  let closest = players[0];
  let closestDist = Math.abs(x - closest.x) + Math.abs(y - closest.y);
  for (let i = 1; i < players.length; i++) {
    let d = Math.abs(x - players[i].x) + Math.abs(y - players[i].y);
    if (d < closestDist) {
      closest = players[i];
      closestDist = d;
    }
  }
  return closest;
}

function checkPlayerDeath(p) {
  if (p.health <= 0) {
    if (pvpMode) return; // PvP handles deaths in bullet collision
    SFX.playerDeath();
    spawnExplosion(p.x, p.y + p.h / 2, '#ffe66d', 40);
    p.lives--;
    if (p.lives > 0) {
      // Respawn with a life
      p.health = p.maxHealth;
      p.invincible = 90;
      p.x = 100 + Math.random() * (canvas.width - 200);
      p.y = GROUND - p.h;
      p.vy = 0;
      p.vx = 0;
      let label = (p === player2) ? 'P2' : (coopMode ? 'P1' : '');
      addFloatingText(`${label} LIVES: ${p.lives}`, p.x, p.y - 30, '#ffe66d', 20, 90);
    } else {
      p.alive = false;
      let allDead = !player.alive && (!player2 || !player2.alive);
      if (allDead) {
        SFX.gameOver();
        state = 'dead';
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('shooterBest', highScore.toString());
        }
      } else {
        let label = (p === player2) ? 'P2 DOWN!' : 'P1 DOWN!';
        addFloatingText(label, p.x, p.y - 20, '#ff6b6b', 24, 120);
      }
    }
  }
}

function updatePlayerMovement(p, keysConfig, dt) {
  if (!p || !p.alive) return;

  // Shield
  if (p.shieldBrokenTimer > 0) {
    p.shieldBrokenTimer -= dt;
    p.shielding = false;
    p.shieldEnergy = Math.min(p.maxShieldEnergy, p.shieldEnergy + dt * 0.1);
    if (p.shieldBrokenTimer <= 0) p.shieldBroken = false;
  } else {
    let wasShielding = p.shielding;
    p.shielding = isKeyPressed(keysConfig.shield) && p.shieldEnergy > 0;
    if (p.shielding && !wasShielding) SFX.shieldUp();
    if (p.shielding) {
      p.shieldEnergy = Math.max(0, p.shieldEnergy - dt);
      if (p.shieldEnergy <= 0) {
        p.shielding = false;
        if (pvpMode) {
          p.shieldBroken = true;
          p.shieldBrokenTimer = 60;
          SFX.shieldBlock();
          screenShake = 5;
          for (let i = 0; i < 15; i++) {
            particles.push({ x: p.x, y: p.y + p.h / 2, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 20, maxLife: 20, color: '#66bbff', size: 3 });
          }
          addFloatingText('SHIELD BREAK!', p.x, p.y - 20, '#66bbff', 18, 60);
        }
      }
    } else {
      p.shieldEnergy = Math.min(p.maxShieldEnergy, p.shieldEnergy + dt * 0.4);
    }
  }

  // Health regen
  p.lastHitTimer += dt;
  if (p.lastHitTimer > 240 && p.health < p.maxHealth) {
    if (Math.floor(p.lastHitTimer) % 30 === 0) {
      p.health = Math.min(p.maxHealth, p.health + 1);
    }
  }

  // Movement
  let moveDir = 0;
  if (isKeyPressed(keysConfig.left)) moveDir = -1;
  if (isKeyPressed(keysConfig.right)) moveDir = 1;

  if (!p.dashing) {
    p.vx = moveDir * MOVE_SPEED;
  }

  if (p.dashing) {
    p.dashTimer--;
    if (p.dashTimer <= 0) p.dashing = false;
  }
  if (p.dashCooldown > 0) p.dashCooldown--;
  if (p.invincible > 0) p.invincible--;

  if (moveDir !== 0 && !p.dashing) p.facing = moveDir;

  // Shooting
  let wep = weapons[p.weapon];
  if (isKeyPressed(keysConfig.shoot)) {
    playerShoot(p);
  }
  if (wep.auto && isKeyPressed(keysConfig.shoot) && p.shootCooldown <= 0) {
    playerShoot(p);
  }

  if (p.shootCooldown > 0) p.shootCooldown -= dt;

  // Reload
  if (p.reloading) {
    p.reloadTimer -= dt;
    if (p.reloadTimer <= 0) {
      SFX.reload();
      p.reloading = false;
      p.ammo = weapons[p.weapon].ammo;
    }
  }

  // Physics
  p.vy += GRAVITY * dt;
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // Trail
  if (p.dashing || Math.abs(p.vx) > 3) {
    p.trail.push({ x: p.x, y: p.y, alpha: 0.5 });
    if (p.trail.length > 8) p.trail.shift();
  } else {
    if (p.trail.length > 0) p.trail.shift();
  }

  // Ground
  p.onGround = false;
  if (p.y + p.h >= GROUND) {
    p.y = GROUND - p.h;
    p.vy = 0;
    p.onGround = true;
    p.jumps = 2;
  }

  // Platform collision
  platforms.forEach(plat => {
    if (p.vy >= 0 &&
        p.x + p.w / 2 > plat.x && p.x - p.w / 2 < plat.x + plat.w &&
        p.y + p.h >= plat.y && p.y + p.h <= plat.y + plat.h + 10) {
      p.y = plat.y - p.h;
      p.vy = 0;
      p.onGround = true;
      p.jumps = 2;
    }
  });

  // Bounds
  p.x = Math.max(p.w / 2, Math.min(canvas.width - p.w / 2, p.x));

  // Weapon timeout
  if (p.weapon !== 'pistol' && p.ammo <= 0 && !p.reloading) {
    p.weapon = 'pistol';
    p.ammo = weapons.pistol.ammo;
    p.maxAmmo = weapons.pistol.ammo;
  }
}

// ─── ONLINE MULTIPLAYER FUNCTIONS ───
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

const CLIENT_KEYS = {
  left: ['a', 'arrowleft'],
  right: ['d', 'arrowright'],
  shoot: ['f'],
  shield: ['e'],
  reload: 'r',
  dash: 'q',
  jump: ['w', ' ', 'arrowup']
};

function isClientKeyPressed(action) {
  let k = CLIENT_KEYS[action];
  if (Array.isArray(k)) return k.some(key => keys[key]);
  return !!keys[k];
}

function processRemoteEvent(p, event) {
  if (!p || !p.alive) return;
  if (event === 'jump' && p.jumps > 0) {
    if (p.jumps === 1) SFX.doubleJump(); else SFX.jump();
    p.vy = p.jumps === 2 ? JUMP_FORCE : DOUBLE_JUMP_FORCE;
    p.onGround = false;
    p.jumps--;
    spawnJumpDust(p);
    if (p.jumps === 0) spawnDoubleJumpEffect(p);
  } else if (event === 'dash' && p.dashCooldown <= 0 && !p.dashing) {
    performDash(p);
  } else if (event === 'reload' && !p.reloading && p.ammo < p.maxAmmo) {
    p.reloading = true;
    p.reloadTimer = 40;
  } else if (event === 'grenade') {
    throwGrenade(p);
  }
}

function connectWs(onConnect, attempt) {
  if (attempt === undefined) attempt = 0;
  if (attempt >= 3) {
    connectionStatus = 'Connection failed. Try again.';
    onlineMode = false; isHost = false; isClient = false;
    return;
  }
  if (attempt === 1) connectionStatus = 'Server may be starting up...';
  if (attempt === 2) connectionStatus = 'Retrying...';

  wsClient = new WebSocket(RELAY_SERVER);

  const timeout = setTimeout(function() {
    if (wsClient) { try { wsClient.close(); } catch(e) {} }
    connectWs(onConnect, attempt + 1);
  }, 15000);

  wsClient.onopen = function() {
    clearTimeout(timeout);
    wsConnected = true;
    onConnect();
  };

  wsClient.onmessage = function(event) {
    try {
      const msg = JSON.parse(event.data);
      handleWsMessage(msg);
    } catch(e) {}
  };

  wsClient.onerror = function() {
    clearTimeout(timeout);
    if (wsClient) { try { wsClient.close(); } catch(e) {} }
    connectWs(onConnect, attempt + 1);
  };

  wsClient.onclose = function() {
    wsConnected = false;
  };
}

function wsSend(data) {
  if (wsClient && wsConnected) {
    wsClient.send(JSON.stringify({ type: 'relay', data: data }));
  }
}

function handleWsMessage(msg) {
  // Server control messages
  if (msg.type === 'created') {
    connectionStatus = 'Waiting for player...';
    return;
  }
  if (msg.type === 'joined') {
    connectionStatus = 'Waiting for host...';
    return;
  }
  if (msg.type === 'peer_joined' && isHost) {
    // Client connected to our room — send welcome and start game
    connectionStatus = 'Connected!';
    coopMode = true;
    wsSend({ type: 'welcome', pvpMode: pvpMode });
    if (pvpMode) { startPvpGame(); } else { startGame(); }
    stateSyncInterval = setInterval(function() {
      if (wsConnected) sendGameState();
    }, 20);
    heartbeatInterval = setInterval(function() {
      if (Date.now() - lastPeerMessage > 10000) handleDisconnect();
    }, 3000);
    return;
  }
  if (msg.type === 'peer_disconnected') {
    cleanupOnline();
    state = 'menu';
    return;
  }
  if (msg.type === 'error') {
    connectionStatus = msg.message || 'Connection error';
    return;
  }
  if (msg.type === 'pong') return;

  // Relayed game messages
  if (msg.type === 'relayed' && msg.data) {
    const data = msg.data;
    lastPeerMessage = Date.now();

    if (data.type === 'welcome' && isClient) {
      connectionStatus = 'Connected!';
      coopMode = true;
      pvpMode = !!data.pvpMode;
      state = pvpMode ? 'pvpIntro' : 'levelIntro';
      levelIntroTimer = pvpMode ? 120 : 180;
      player = createPlayer(pvpMode ? canvas.width / 4 : canvas.width / 3);
      player2 = createPlayer(pvpMode ? canvas.width * 3 / 4 : canvas.width * 2 / 3, { body: '#27ae60', dash: '#f39c12', skin: '#f4d35e', hat: '#1a5c2e', hatBand: '#f39c12', shoe: '#f39c12' });
      bullets = [];
      enemies = [];
      particles = [];
      powerups = [];
      floatingTexts = [];
      casings = [];
      grenades = [];
      score = 0;
      level = 1;
      wave = 0;
      p1Kills = 0;
      p2Kills = 0;
      pvpWinner = '';
      if (pvpMode) { generatePvpArena(); } else { generatePlatforms(); }
      inputSendInterval = setInterval(function() {
        if (wsConnected) sendClientInput();
      }, 25);
      heartbeatInterval = setInterval(function() {
        if (Date.now() - lastPeerMessage > 10000) handleDisconnect();
      }, 3000);
    }
    if (data.type === 'pause') {
      paused = data.paused;
      pauseSelection = 0;
    }
    if (data.type === 'disconnect') {
      cleanupOnline();
      state = 'menu';
    }
    if (data.type === 'input' && isHost) {
      applyRemoteInput(data);
    }
    if (data.type === 'state' && isClient) {
      applyHostState(data);
    }
  }
}

function startHosting() {
  roomCode = generateRoomCode();
  connectionStatus = 'Connecting to server...';
  isHost = true;
  onlineMode = true;
  lastPeerMessage = Date.now();

  connectWs(function() {
    wsClient.send(JSON.stringify({ type: 'create', room: roomCode }));
  });
}

function joinRoom(code) {
  connectionStatus = 'Connecting to server...';
  isClient = true;
  onlineMode = true;
  roomCode = code;
  lastPeerMessage = Date.now();

  connectWs(function() {
    wsClient.send(JSON.stringify({ type: 'join', room: code }));
  });
}

function cleanupOnline() {
  if (stateSyncInterval) { clearInterval(stateSyncInterval); stateSyncInterval = null; }
  if (inputSendInterval) { clearInterval(inputSendInterval); inputSendInterval = null; }
  if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
  if (wsClient) { try { wsClient.close(); } catch(e) {} wsClient = null; }
  wsConnected = false;
  onlineMode = false;
  isHost = false;
  isClient = false;
  disconnected = false;
  disconnectTimer = 0;
  coopMode = false;
  roomCode = '';
  roomCodeInput = '';
  connectionStatus = '';
  sfxBuffer = [];
  floatingTextBuffer = [];
  clientInputState = { keys: { left: false, right: false, shoot: false, shield: false }, events: [] };
}

function handleDisconnect() {
  if (disconnected) return;
  disconnected = true;
  disconnectTimer = 180;
  if (isHost) {
    keys['_r_left'] = false;
    keys['_r_right'] = false;
    keys['_r_shoot'] = false;
    keys['_r_shield'] = false;
  }
}

function applyRemoteInput(data) {
  if (!player2) return;
  keys['_r_left'] = data.keys.left;
  keys['_r_right'] = data.keys.right;
  keys['_r_shoot'] = data.keys.shoot;
  keys['_r_shield'] = data.keys.shield;

  if (data.events) {
    data.events.forEach(event => processRemoteEvent(player2, event));
  }
}

function sendClientInput() {
  if (!wsConnected) return;
  wsSend({
    type: 'input',
    keys: {
      left: isClientKeyPressed('left'),
      right: isClientKeyPressed('right'),
      shoot: isClientKeyPressed('shoot'),
      shield: isClientKeyPressed('shield'),
    },
    events: clientInputState.events.splice(0),
  });
}

function r2(n) { return Math.round(n * 100) / 100; }
function serializePlayer(p) {
  if (!p) return null;
  return {
    x: r2(p.x), y: r2(p.y), vx: r2(p.vx), vy: r2(p.vy),
    facing: p.facing, onGround: p.onGround, jumps: p.jumps,
    health: p.health, maxHealth: p.maxHealth,
    dashing: p.dashing, dashTimer: p.dashTimer, dashCooldown: p.dashCooldown,
    invincible: p.invincible,
    ammo: p.ammo, maxAmmo: p.maxAmmo,
    reloading: p.reloading, reloadTimer: p.reloadTimer,
    weapon: p.weapon,
    shielding: p.shielding,
    shieldEnergy: r2(p.shieldEnergy), maxShieldEnergy: p.maxShieldEnergy,
    alive: p.alive,
    shootCooldown: r2(p.shootCooldown),
    lastHitTimer: p.lastHitTimer,
    grenadeCount: p.grenadeCount,
    grenadeCooldown: p.grenadeCooldown,
  };
}

function sendGameState() {
  if (!wsConnected) return;

  wsSend({
    type: 'state',
    p1: serializePlayer(player),
    p2: player2 ? serializePlayer(player2) : null,
    enemies: enemies.map(e => ({
      x: r2(e.x), y: r2(e.y), type: e.type, health: e.health, maxHealth: e.maxHealth,
      facing: e.facing, alive: e.alive, dying: !!e.dying, deathTimer: e.deathTimer || 0,
      deathVx: e.deathVx || 0, deathVy: e.deathVy || 0, deathRotation: e.deathRotation || 0,
      deathRotSpeed: e.deathRotSpeed || 0, vy: r2(e.vy), hit: e.hit,
      speed: e.speed, boss: !!e.boss, bomber: !!e.bomber,
      flying: !!e.flying, mega: !!e.mega, flyBaseY: e.flyBaseY || 0, flyPhase: e.flyPhase || 0,
    })),
    bullets: bullets.filter(b => !b.predicted).map(b => ({
      x: r2(b.x), y: r2(b.y), vx: r2(b.vx), vy: r2(b.vy), color: b.color, size: b.size,
      isPlayer: b.isPlayer, owner: b.owner, life: b.life, explosive: !!b.explosive,
    })),
    powerups: powerups.map(p => ({
      x: p.x, y: p.y, vy: p.vy, w: p.w, h: p.h, type: p.type, color: p.color, life: p.life,
    })),
    grenades: grenades.map(g => ({
      x: g.x, y: g.y, vx: g.vx, vy: g.vy, fuse: g.fuse, bounced: g.bounced, rotation: g.rotation,
    })),
    state: state,
    score: score,
    level: level,
    wave: wave,
    wavesPerLevel: wavesPerLevel,
    killStreak: killStreak,
    slowMo: slowMo,
    slowMoTimer: slowMoTimer,
    screenShake: screenShake,
    levelIntroTimer: levelIntroTimer,
    levelTransitionTimer: levelTransitionTimer,
    sfx: sfxBuffer.splice(0),
    texts: floatingTextBuffer.splice(0),
    pvpMode: pvpMode,
    p1Kills: p1Kills,
    p2Kills: p2Kills,
    pvpWinner: pvpWinner,
  });
}

function applyPlayerState(p, data) {
  p.x = data.x; p.y = data.y;
  p.vx = data.vx; p.vy = data.vy;
  p.facing = data.facing;
  p.onGround = data.onGround;
  p.jumps = data.jumps;
  p.health = data.health; p.maxHealth = data.maxHealth;
  p.dashing = data.dashing;
  p.dashTimer = data.dashTimer;
  p.dashCooldown = data.dashCooldown;
  p.invincible = data.invincible;
  p.ammo = data.ammo; p.maxAmmo = data.maxAmmo;
  p.reloading = data.reloading;
  p.reloadTimer = data.reloadTimer;
  p.weapon = data.weapon;
  p.shielding = data.shielding;
  p.shieldEnergy = data.shieldEnergy;
  p.maxShieldEnergy = data.maxShieldEnergy;
  p.alive = data.alive;
  p.shootCooldown = data.shootCooldown;
  p.lastHitTimer = data.lastHitTimer;
  if (data.grenadeCount !== undefined) p.grenadeCount = data.grenadeCount;
  if (data.grenadeCooldown !== undefined) p.grenadeCooldown = data.grenadeCooldown;
}

function applyPlayerStateSmooth(p, data, isLocal) {
  if (isLocal) {
    // Optimistic: trust local prediction for position, only snap on huge divergence
    let dx = data.x - p.x;
    let dy = data.y - p.y;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 120) {
      // Teleport/respawn — snap
      p.x = data.x; p.y = data.y;
      p.vx = data.vx; p.vy = data.vy;
    }
    // Sync authoritative game state (health, weapons, etc.) but NOT position/velocity
    p.health = data.health; p.maxHealth = data.maxHealth;
    p.alive = data.alive;
    p.weapon = data.weapon;
    p.shielding = data.shielding;
    p.shieldEnergy = data.shieldEnergy;
    p.maxShieldEnergy = data.maxShieldEnergy;
    p.lastHitTimer = data.lastHitTimer;
    p.onGround = data.onGround;
    p.jumps = data.jumps;
    if (data.grenadeCount !== undefined) p.grenadeCount = data.grenadeCount;
    if (data.grenadeCooldown !== undefined) p.grenadeCooldown = data.grenadeCooldown;
  } else {
    // Remote player: interpolate with velocity extrapolation
    let targetX = data.x + data.vx * 2;
    let targetY = data.y;
    p.x += (targetX - p.x) * 0.5;
    p.y += (targetY - p.y) * 0.5;
    p.vx = data.vx;
    p.vy = data.vy;
    p.facing = data.facing;
    p.onGround = data.onGround;
    p.jumps = data.jumps;
    p.health = data.health; p.maxHealth = data.maxHealth;
    p.dashing = data.dashing;
    p.dashTimer = data.dashTimer;
    p.dashCooldown = data.dashCooldown;
    p.invincible = data.invincible;
    p.ammo = data.ammo; p.maxAmmo = data.maxAmmo;
    p.reloading = data.reloading;
    p.reloadTimer = data.reloadTimer;
    p.weapon = data.weapon;
    p.shielding = data.shielding;
    p.shieldEnergy = data.shieldEnergy;
    p.maxShieldEnergy = data.maxShieldEnergy;
    p.alive = data.alive;
    p.shootCooldown = data.shootCooldown;
    p.lastHitTimer = data.lastHitTimer;
    if (data.grenadeCount !== undefined) p.grenadeCount = data.grenadeCount;
    if (data.grenadeCooldown !== undefined) p.grenadeCooldown = data.grenadeCooldown;
  }
}

function applyHostState(data) {
  // Player1 is the opponent for the client, player2 is local
  if (data.p1) applyPlayerStateSmooth(player, data.p1, false);
  if (data.p2) {
    if (!player2) {
      player2 = createPlayer(canvas.width * 2 / 3, { body: '#27ae60', dash: '#f39c12', skin: '#f4d35e', hat: '#1a5c2e', hatBand: '#f39c12', shoe: '#f39c12' });
    }
    applyPlayerStateSmooth(player2, data.p2, true);
  }

  enemies = data.enemies.map(e => {
    let def = enemyTypes[e.type];
    return {
      ...def, ...e,
      w: def.w, h: def.h, color: def.color,
      shootTimer: 0, patrolDir: e.facing,
    };
  });

  let predicted = bullets.filter(b => b.predicted && b.life > 0);
  bullets = data.bullets.map(b => ({ ...b, trail: [], damage: 0 })).concat(predicted);
  powerups = data.powerups;
  if (data.grenades) grenades = data.grenades;

  state = data.state;
  score = data.score;
  if (data.level !== level) {
    level = data.level;
    generatePlatforms();
  }
  wave = data.wave;
  wavesPerLevel = data.wavesPerLevel;
  killStreak = data.killStreak;
  slowMo = data.slowMo;
  slowMoTimer = data.slowMoTimer;
  screenShake = data.screenShake;
  levelIntroTimer = data.levelIntroTimer;
  levelTransitionTimer = data.levelTransitionTimer;
  if (data.pvpMode !== undefined) pvpMode = data.pvpMode;
  if (data.p1Kills !== undefined) p1Kills = data.p1Kills;
  if (data.p2Kills !== undefined) p2Kills = data.p2Kills;
  if (data.pvpWinner !== undefined) pvpWinner = data.pvpWinner;

  if (data.sfx) {
    data.sfx.forEach(name => {
      if (SFX[name]) SFX[name]();
    });
  }

  if (data.texts) {
    data.texts.forEach(t => {
      floatingTexts.push({ ...t, maxLife: t.life });
    });
  }
}

function clientShootPredict() {
  if (!player2 || !player2.alive) return;
  let p = player2;
  if (p.shielding || p.shootCooldown > 0 || p.reloading || p.ammo <= 0) return;
  if (!isClientKeyPressed('shoot')) return;
  let wep = weapons[p.weapon];
  p.shootCooldown = wep.fireRate;
  let pellets = wep.pellets || 1;
  for (let i = 0; i < pellets; i++) {
    let spread = (Math.random() - 0.5) * wep.spread * 2;
    let bx = p.x + p.facing * 20;
    let by = p.y + 14;
    bullets.push({
      x: bx, y: by,
      vx: Math.cos(spread) * wep.speed * p.facing,
      vy: Math.sin(spread) * wep.speed,
      damage: 0, color: wep.color, size: wep.size,
      isPlayer: true, owner: 2, life: 80, trail: [], explosive: false,
      predicted: true,
    });
  }
  p.ammo--;
  if (p.ammo <= 0) { p.reloading = true; p.reloadTimer = 50; }
  if (SFX['shoot_' + p.weapon]) SFX['shoot_' + p.weapon]();
  spawnMuzzleFlash(p.x + p.facing * 24, p.y + 14, p.facing);
  spawnCasing(p.x, p.y + 10, p.facing);
  screenShake = Math.max(screenShake, wep.fireRate > 15 ? 4 : 2);
}

function clientUpdate() {
  let dt = slowMo;

  // Client-side shoot prediction for instant feedback
  if (state === 'playing') clientShootPredict();

  // Client-side movement prediction for local player (player2)
  if (player2 && player2.alive && state === 'playing') {
    if (!player2.dashing) {
      let moveDir = 0;
      if (isClientKeyPressed('left')) moveDir = -1;
      if (isClientKeyPressed('right')) moveDir = 1;
      player2.vx = moveDir * MOVE_SPEED;
      if (moveDir !== 0) player2.facing = moveDir;
    }
    if (player2.dashing) {
      player2.dashTimer--;
      if (player2.dashTimer <= 0) player2.dashing = false;
    }
    if (player2.dashCooldown > 0) player2.dashCooldown -= dt;
    if (player2.shootCooldown > 0) player2.shootCooldown -= dt;
    if (player2.invincible > 0) player2.invincible -= dt;
    if (player2.reloading) {
      player2.reloadTimer -= dt;
      if (player2.reloadTimer <= 0) {
        player2.reloading = false;
        player2.ammo = player2.maxAmmo;
      }
    }
  }

  [player, player2].forEach(p => {
    if (!p || !p.alive) return;
    p.vy += GRAVITY * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    if (p.y + p.h >= GROUND) {
      p.y = GROUND - p.h;
      p.vy = 0;
      p.onGround = true;
    }

    platforms.forEach(plat => {
      if (p.vy >= 0 &&
          p.x + p.w / 2 > plat.x && p.x - p.w / 2 < plat.x + plat.w &&
          p.y + p.h >= plat.y && p.y + p.h <= plat.y + plat.h + 10) {
        p.y = plat.y - p.h;
        p.vy = 0;
        p.onGround = true;
      }
    });

    p.x = Math.max(p.w / 2, Math.min(canvas.width - p.w / 2, p.x));

    if (p.dashing || Math.abs(p.vx) > 3) {
      p.trail.push({ x: p.x, y: p.y, alpha: 0.5 });
      if (p.trail.length > 8) p.trail.shift();
    } else {
      if (p.trail.length > 0) p.trail.shift();
    }
  });

  enemies.forEach(e => {
    if (!e.alive) return;
    if (e.dying) {
      e.deathTimer -= dt;
      if (e.deathVx) e.x += e.deathVx * dt;
      if (e.deathVy !== undefined) {
        e.deathVy += GRAVITY * dt;
        e.y += e.deathVy * dt;
      }
      if (e.deathRotation !== undefined && e.deathRotSpeed) {
        e.deathRotation += e.deathRotSpeed;
      }
      if (e.y + e.h >= GROUND) { e.y = GROUND - e.h; }
      if (e.deathTimer <= 0) e.alive = false;
      return;
    }
    if (!e.flying) {
      e.vy += GRAVITY * dt;
      e.y += e.vy * dt;
      if (e.y + e.h >= GROUND) { e.y = GROUND - e.h; e.vy = 0; }
    }
  });

  bullets.forEach(b => {
    b.trail = b.trail || [];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.shift();
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Client-side hit detection for visual feedback (no damage, host is authoritative)
    if (b.isPlayer && pvpMode && b.life > 0) {
      let target = b.owner === 1 ? player2 : player;
      if (target && target.alive && target.invincible <= 0 &&
          Math.abs(b.x - target.x) < target.w / 2 + b.size &&
          Math.abs(b.y - (target.y + target.h / 2)) < target.h / 2 + b.size) {
        b.life = 0;
        if (target.shielding) {
          SFX.shieldBlock();
          screenShake = 2;
          for (let i = 0; i < 5; i++) {
            particles.push({ x: b.x, y: b.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 10, maxLife: 10, color: '#66bbff', size: 3 });
          }
        } else {
          SFX.playerHit();
          spawnBlood(target.x, target.y + target.h / 2);
          screenShake = 6;
          target.vx += b.vx * 0.3;
          target.vy -= 2;
        }
      }
    }
  });
  bullets = bullets.filter(b => b.life > 0 && b.x > -50 && b.x < canvas.width + 50);

  // Grenade visual physics (client interpolation)
  grenades.forEach(g => {
    g.vy += GRAVITY * 0.6 * dt;
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.rotation += 0.15 * dt;
    g.fuse -= dt;
    if (g.y >= GROUND - 5) { g.y = GROUND - 5; g.vy = 0; g.vx *= 0.9; }
  });
  grenades = grenades.filter(g => g.fuse > 0);

  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.1;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  casings.forEach(c => {
    if (!c.grounded) {
      c.vy += 0.3;
      c.x += c.vx;
      c.y += c.vy;
      c.rotation += c.vr;
      if (c.y >= GROUND - 2) { c.y = GROUND - 2; c.grounded = true; }
    }
  });
  if (casings.length > 50) casings.splice(0, casings.length - 50);

  floatingTexts.forEach(t => { t.y -= 0.5; t.life--; });
  floatingTexts = floatingTexts.filter(t => t.life > 0);

  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.5) screenShake = 0;
}

// ─── UPDATE ───
function update() {
  if (paused) return;

  // Handle disconnect countdown
  if (disconnected) {
    disconnectTimer--;
    if (disconnectTimer <= 0) {
      cleanupOnline();
      state = 'menu';
    }
    return;
  }

  // Client uses clientUpdate instead
  if (onlineMode && isClient) {
    clientUpdate();
    return;
  }

  // Handle PvP intro countdown
  if (state === 'pvpIntro') {
    levelIntroTimer--;
    if (levelIntroTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  // Handle level intro countdown
  if (state === 'levelIntro') {
    levelIntroTimer--;
    if (levelIntroTimer <= 0) {
      state = 'playing';
    }
    return;
  }
  // Handle level complete countdown
  if (state === 'levelComplete') {
    levelTransitionTimer--;
    if (levelTransitionTimer <= 0) {
      level++;
      if (level > DEMO_LEVELS && !fullVersionUnlocked) {
        state = 'demo-locked';
        unlockCodeInput = '';
        return;
      }
      startLevel();
    }
    return;
  }
  if (state !== 'playing') return;

  // PvP round reset timer
  if (pvpMode && pvpRoundTimer > 0) {
    pvpRoundTimer--;
    if (pvpRoundTimer <= 0) {
      pvpResetRound();
    }
    // Still update particles/effects during countdown
  }

  let dt = slowMo;
  if (slowMoTimer > 0) {
    slowMoTimer--;
    slowMo = 0.4;
    if (slowMoTimer <= 0) slowMo = 1;
  } else {
    slowMo = 1;
  }

  // Player movement
  let p1Keys = (coopMode && !onlineMode) ? P1_KEYS_COOP : P1_KEYS;
  updatePlayerMovement(player, p1Keys, dt);
  if (player2) updatePlayerMovement(player2, (onlineMode && isHost) ? REMOTE_P2_KEYS : P2_KEYS, dt);

  // ─── ENEMIES ───
  enemies.forEach(e => {
    if (!e.alive) return;

    // Death animation
    if (e.dying) {
      e.deathTimer -= dt;
      e.x += e.deathVx * dt;
      e.deathVy += GRAVITY * dt;
      e.y += e.deathVy * dt;
      e.deathRotation += e.deathRotSpeed;
      if (e.y + e.h >= GROUND) { e.y = GROUND - e.h; e.deathVy = 0; e.deathVx *= 0.5; }
      if (e.deathTimer <= 0) {
        e.alive = false;
        spawnBlood(e.x, e.y + e.h / 2);
      }
      return;
    }

    if (e.hit > 0) e.hit--;

    // AI Movement
    let target = getClosestLivingPlayer(e.x, e.y);
    let toPlayer = target.x - e.x;
    let dist = Math.abs(toPlayer);

    if (e.type === 'bomber') {
      // Bombers rush toward closest player
      e.facing = toPlayer > 0 ? 1 : -1;
      e.x += e.facing * e.speed * dt;
      let livingPlayers = [player, player2].filter(p => p && p.alive);
      let shouldExplode = livingPlayers.some(p => Math.abs(e.x - p.x) < 30);
      if (shouldExplode) {
        SFX.explosion();
        spawnExplosion(e.x, e.y + e.h / 2, '#ff006e', 30);
        livingPlayers.forEach(p => {
          if (Math.abs(e.x - p.x) < 60) {
            if (p.shielding) {
              SFX.shieldBlock();
              screenShake = 4;
            } else if (p.invincible <= 0) {
              p.health--;
              p.lastHitTimer = 0;
              screenShake = 10;
              checkPlayerDeath(p);
            }
          }
        });
        e.alive = false;
        score += e.score;
        return;
      }
    } else if (e.flying) {
      // Flying enemy AI (drones, gunships)
      e.facing = toPlayer > 0 ? 1 : -1;
      e.x += e.facing * e.speed * dt;
      // Sinusoidal bobbing
      e.flyPhase += 0.03 * dt;
      e.y = e.flyBaseY + Math.sin(e.flyPhase) * 15;
      // Keep in bounds vertically
      if (e.y < 20) { e.y = 20; e.flyBaseY = 20; }
      if (e.y + e.h > GROUND - 30) { e.flyBaseY -= 2; }
      // Strafe: if close, back off; if far, close in
      if (dist < 60) {
        e.x -= e.facing * e.speed * 0.5 * dt;
      }
      // Gunship burst fire
      if (e.burstCount) {
        if (e.burstRemaining > 0) {
          e.burstDelay -= dt;
          if (e.burstDelay <= 0) {
            enemyShoot(e);
            e.burstRemaining--;
            e.burstDelay = 8;
          }
        } else {
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = e.shootRate + Math.random() * 20;
            e.burstRemaining = e.burstCount;
            e.burstDelay = 0;
          }
        }
      } else {
        // Drone single shot
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && e.shootRate > 0) {
          e.shootTimer = e.shootRate + Math.random() * 20;
          enemyShoot(e);
        }
      }
    } else if (e.mega) {
      // Megaboss AI - charges, rapid bursts, shockwave stomps
      e.facing = toPlayer > 0 ? 1 : -1;
      // Aggressive charge
      if (dist > 100) {
        e.x += e.facing * e.speed * 1.5 * dt;
      } else if (dist < 50) {
        e.x -= e.facing * e.speed * 0.3 * dt;
      }
      // Rapid 5-shot burst
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate + Math.random() * 10;
        for (let s = 0; s < 5; s++) {
          setTimeout(() => {
            if (!e.alive || state !== 'playing') return;
            enemyShoot(e);
            screenShake = 4;
          }, s * 60);
        }
      }
      // Frequent stomp jumps with shockwave
      if (!e._jumpTimer) e._jumpTimer = 120;
      e._jumpTimer -= dt;
      if (e._jumpTimer <= 0 && e.y + e.h >= GROUND - 2) {
        e.vy = -12;
        e._jumpTimer = 120 + Math.random() * 80;
        SFX.explosion();
        spawnExplosion(e.x, e.y + e.h, '#ff1744', 15);
        // Shockwave damage to nearby players
        let livingPlayers = [player, player2].filter(p => p && p.alive);
        livingPlayers.forEach(p => {
          let sdist = Math.abs(e.x - p.x);
          if (sdist < 100) {
            if (p.shielding) {
              SFX.shieldBlock();
              screenShake = 5;
            } else if (p.invincible <= 0) {
              p.health -= 2;
              p.lastHitTimer = 0;
              p.vy = -6;
              screenShake = 12;
              spawnBlood(p.x, p.y + p.h / 2);
              addFloatingText('SHOCKWAVE!', p.x, p.y - 20, '#ff1744', 16, 50);
              checkPlayerDeath(p);
            }
          }
        });
      }
    } else if (e.boss) {
      // Boss AI - aggressive, multi-shot, stomps
      e.facing = toPlayer > 0 ? 1 : -1;
      if (dist > 150) {
        e.x += e.facing * e.speed * dt;
      } else if (dist < 60) {
        e.x -= e.facing * e.speed * 0.3 * dt;
      }
      // Multi-shot burst
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate + Math.random() * 10;
        for (let s = 0; s < 3; s++) {
          setTimeout(() => {
            if (!e.alive || state !== 'playing') return;
            enemyShoot(e);
            screenShake = 3;
          }, s * 80);
        }
      }
      // Boss stomp/jump
      if (!e._jumpTimer) e._jumpTimer = 200;
      e._jumpTimer -= dt;
      if (e._jumpTimer <= 0 && e.y + e.h >= GROUND - 2) {
        e.vy = -10;
        e._jumpTimer = 180 + Math.random() * 120;
        SFX.explosion();
        spawnExplosion(e.x, e.y + e.h, '#ff4444', 8);
      }
    } else {
      // Others patrol and shoot
      if (dist > 200) {
        e.facing = toPlayer > 0 ? 1 : -1;
        e.x += e.facing * e.speed * dt;
      } else if (dist < 80) {
        e.facing = toPlayer > 0 ? 1 : -1;
        e.x -= e.facing * e.speed * 0.5 * dt;
      } else {
        e.facing = toPlayer > 0 ? 1 : -1;
      }

      // Shoot
      e.shootTimer -= dt;
      if (e.shootTimer <= 0 && e.shootRate > 0) {
        e.shootTimer = e.shootRate + Math.random() * 20;
        enemyShoot(e);
      }
    }

    // Gravity and platform collision (skip for flying enemies)
    if (!e.flying) {
      e.vy += GRAVITY * dt;
      e.y += e.vy * dt;

      if (e.y + e.h >= GROUND) {
        e.y = GROUND - e.h;
        e.vy = 0;
      }

      // Platform collision for enemies
      platforms.forEach(p => {
        if (e.vy >= 0 &&
            e.x + e.w / 2 > p.x && e.x - e.w / 2 < p.x + p.w &&
            e.y + e.h >= p.y && e.y + e.h <= p.y + p.h + 8) {
          e.y = p.y - e.h;
          e.vy = 0;
        }
      });
    }

    // Bounds
    e.x = Math.max(e.w / 2, Math.min(canvas.width - e.w / 2, e.x));
  });

  // ─── BULLETS ───
  bullets.forEach(b => {
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.shift();

    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // RPG ground contact explosion
    if (b.isPlayer && b.explosive && b.y >= GROUND - 2) {
      rpgExplode(b.x, GROUND);
      b.life = 0;
    }

    if (b.isPlayer && pvpMode) {
      // PvP: hit the OTHER player (bigger hitbox online for lag compensation)
      let target = b.owner === 1 ? player2 : player;
      let hitMul = onlineMode ? 1.5 : 1;
      if (target && target.alive && target.invincible <= 0 &&
          Math.abs(b.x - target.x) < (target.w / 2 + b.size) * hitMul &&
          Math.abs(b.y - (target.y + target.h / 2)) < (target.h / 2 + b.size) * hitMul) {
        if (target.shielding) {
          b.life = 0;
          SFX.shieldBlock();
          screenShake = 2;
          for (let i = 0; i < 5; i++) {
            particles.push({ x: b.x, y: b.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 10, maxLife: 10, color: '#66bbff', size: 3 });
          }
        } else {
          let pvpDmg = pvpMode ? Math.min(b.damage, 3) : b.damage;
          target.health -= pvpDmg;
          target.lastHitTimer = 0;
          b.life = 0;
          screenShake = 8;
          target.invincible = 30;
          target.vx += b.vx * 0.4;
          target.vy -= 3;
          SFX.playerHit();
          spawnBlood(target.x, target.y + target.h / 2);
          // Impact sparks
          for (let i = 0; i < 8; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = 2 + Math.random() * 5;
            particles.push({ x: b.x, y: b.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 15, maxLife: 15, color: '#ffe66d', size: 2 + Math.random() * 2 });
          }
          // Hit flash ring
          particles.push({ x: target.x, y: target.y + target.h / 2, vx: 0, vy: 0, life: 8, maxLife: 8, color: '#fff', size: 20, ring: true });
          // Damage text with random offset
          let ox = (Math.random() - 0.5) * 20;
          addFloatingText('-' + pvpDmg, target.x + ox, target.y - 5, '#ff6b6b', 22, 45);
          // Hit words
          let hitWords = ['POW!', 'BAM!', 'WHAM!', 'HIT!', 'OUCH!', 'ZAP!', 'BOOM!'];
          if (Math.random() > 0.5) {
            addFloatingText(hitWords[Math.floor(Math.random() * hitWords.length)], target.x + (Math.random() - 0.5) * 40, target.y - 25, b.owner === 1 ? '#4ecdc4' : '#f39c12', 16, 35);
          }
          if (target.health <= 0) {
            target.alive = false;
            SFX.playerDeath();
            spawnExplosion(target.x, target.y + target.h / 2, '#ffe66d', 50);
            spawnExplosion(target.x, target.y + target.h / 2, '#ff6b6b', 30);
            // Big kill text
            let killerColor = b.owner === 1 ? '#3498db' : '#27ae60';
            if (b.owner === 1) {
              p1Kills++;
              addFloatingText('K.O.!', canvas.width / 2, 80, killerColor, 36, 100);
              addFloatingText(p1Kills + ' / ' + KILLS_TO_WIN, canvas.width / 2, 115, '#ffe66d', 18, 80);
            } else {
              p2Kills++;
              addFloatingText('K.O.!', canvas.width / 2, 80, killerColor, 36, 100);
              addFloatingText(p2Kills + ' / ' + KILLS_TO_WIN, canvas.width / 2, 115, '#ffe66d', 18, 80);
            }
            screenShake = 14;
            slowMo = 0.2;
            slowMoTimer = 40;
            if (p1Kills >= KILLS_TO_WIN || p2Kills >= KILLS_TO_WIN) {
              pvpWinner = p1Kills >= KILLS_TO_WIN ? 'P1' : 'P2';
              state = 'pvpWin';
            } else {
              pvpRoundTimer = 90;
            }
          }
        }
      }
    } else if (b.isPlayer) {
      // Hit enemies
      enemies.forEach(e => {
        if (!e.alive || e.dying) return;
        if (Math.abs(b.x - e.x) < e.w / 2 + b.size && Math.abs(b.y - (e.y + e.h / 2)) < e.h / 2 + b.size) {
          b.life = 0;
          // RPG: explode on impact for area damage
          if (b.explosive) {
            rpgExplode(b.x, b.y);
            return;
          }
          e.health -= b.damage;
          e.hit = 6;
          spawnBlood(b.x, b.y);
          SFX.enemyHit();
          screenShake = Math.max(screenShake, 2);

          if (e.health <= 0 && !e.dying) {
            e.dying = true;
            e.deathTimer = 45;
            e.deathVx = (Math.random() - 0.5) * 3 + (b.vx > 0 ? 2 : -2);
            e.deathVy = -4 - Math.random() * 3;
            e.deathRotation = 0;
            e.deathRotSpeed = (Math.random() - 0.5) * 0.15 + (b.vx > 0 ? 0.08 : -0.08);
            score += e.score;
            killStreak++;
            killStreakTimer = 120;

            if (killStreak >= 3) {
              let mult = Math.min(killStreak, 10);
              let bonus = e.score * (mult - 1);
              score += bonus;
              addFloatingText(`${killStreak}x COMBO! +${bonus}`, e.x, e.y - 20, '#ffe66d', 20, 60);
            }

            SFX.enemyDeath();
            spawnExplosion(e.x, e.y + e.h / 2, e.color);
            addFloatingText(`+${e.score}`, e.x, e.y, '#fff', 14, 40);
          }
        }
      });
    } else {
      // Hit players - check all living players
      let livingPlayers = [player, player2].filter(p => p && p.alive);
      for (let p of livingPlayers) {
        if (p.invincible <= 0 &&
            Math.abs(b.x - p.x) < p.w / 2 + b.size &&
            Math.abs(b.y - (p.y + p.h / 2)) < p.h / 2 + b.size) {
          if (p.shielding) {
            b.life = 0;
            SFX.shieldBlock();
            screenShake = 2;
            for (let i = 0; i < 5; i++) {
              particles.push({ x: b.x, y: b.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 10, maxLife: 10, color: '#66bbff', size: 3 });
            }
          } else {
            p.health--;
            p.lastHitTimer = 0;
            b.life = 0;
            screenShake = 6;
            p.invincible = 30;
            SFX.playerHit();
            spawnBlood(p.x, p.y + p.h / 2);
            addFloatingText('-1', p.x, p.y, '#ff6b6b', 20, 40);
            checkPlayerDeath(p);
          }
          break;
        }
      }
    }
  });

  // Clean up
  bullets = bullets.filter(b => b.life > 0 && b.x > -50 && b.x < canvas.width + 50 && b.y > -50 && b.y < canvas.height + 50);
  enemies = enemies.filter(e => e.alive);

  // ─── POWERUPS ───
  powerups.forEach(pu => {
    pu.vy += 0.15;
    pu.y += pu.vy;
    pu.life--;

    // Ground
    if (pu.y + pu.h >= GROUND) { pu.y = GROUND - pu.h; pu.vy = 0; }

    // Platform
    platforms.forEach(plat => {
      if (pu.vy >= 0 && pu.x + pu.w / 2 > plat.x && pu.x - pu.w / 2 < plat.x + plat.w &&
          pu.y + pu.h >= plat.y && pu.y + pu.h <= plat.y + plat.h + 8) {
        pu.y = plat.y - pu.h; pu.vy = 0;
      }
    });

    // Pickup - check both players
    let livingPlayers = [player, player2].filter(p => p && p.alive);
    for (let p of livingPlayers) {
      if (Math.abs(pu.x - p.x) < 25 && Math.abs(pu.y - (p.y + p.h / 2)) < 30) {
        SFX.pickup();
        pu.life = 0;
        spawnExplosion(pu.x, pu.y, pu.color, 10);
        if (pu.type === 'health') {
          p.health = Math.min(p.maxHealth, p.health + 2);
          addFloatingText('+2 HP', pu.x, pu.y - 10, '#ff6b6b', 18, 50);
        } else if (pu.type === 'slowmo') {
          slowMoTimer = 180;
          addFloatingText('SLOW-MO!', pu.x, pu.y - 10, '#c77dff', 18, 50);
        } else if (pu.type === 'grenade') {
          p.grenadeCount = Math.min(p.maxGrenades, p.grenadeCount + 3);
          addFloatingText('+3 GRENADES!', pu.x, pu.y - 10, '#ff9800', 18, 50);
        } else {
          p.weapon = pu.type;
          p.ammo = weapons[pu.type].ammo;
          p.maxAmmo = weapons[pu.type].ammo;
          p.reloading = false;
          addFloatingText(weapons[pu.type].name.toUpperCase() + '!', pu.x, pu.y - 10, pu.color, 18, 50);
        }
        break;
      }
    }
  });
  powerups = powerups.filter(pu => pu.life > 0);

  // ─── GRENADES ───
  [player, player2].forEach(p => { if (p && p.grenadeCooldown > 0) p.grenadeCooldown -= dt; });
  grenades.forEach(g => {
    g.vy += GRAVITY * 0.6 * dt;
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.rotation += 0.15 * dt;
    g.fuse -= dt;
    // Bounce off ground
    if (g.y >= GROUND - 5) {
      g.y = GROUND - 5;
      if (!g.bounced) {
        g.bounced = true;
        g.vy = -Math.abs(g.vy) * 0.4;
        g.vx *= 0.6;
        SFX.grenadeBounce();
      } else {
        g.vy = 0;
        g.vx *= 0.9;
      }
    }
    // Bounce off platforms
    platforms.forEach(p => {
      if (g.vy >= 0 && g.x > p.x && g.x < p.x + p.w &&
          g.y >= p.y - 5 && g.y <= p.y + p.h) {
        g.y = p.y - 5;
        if (!g.bounced) {
          g.bounced = true;
          g.vy = -Math.abs(g.vy) * 0.4;
          g.vx *= 0.6;
          SFX.grenadeBounce();
        } else {
          g.vy = 0;
          g.vx *= 0.9;
        }
      }
    });
    // Smoke trail particles
    if (Math.random() > 0.5) {
      particles.push({
        x: g.x, y: g.y, vx: (Math.random() - 0.5) * 1, vy: -Math.random() * 1.5,
        life: 12, maxLife: 12, color: '#888', size: 2 + Math.random() * 2
      });
    }
    // Explode when fuse runs out
    if (g.fuse <= 0) {
      grenadeExplode(g);
    }
  });
  grenades = grenades.filter(g => g.fuse > 0);

  // ─── PARTICLES ───
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.1;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Casings
  casings.forEach(c => {
    if (!c.grounded) {
      c.vy += 0.3;
      c.x += c.vx;
      c.y += c.vy;
      c.rotation += c.vr;
      if (c.y >= GROUND - 2) { c.y = GROUND - 2; c.grounded = true; }
    }
  });
  if (casings.length > 50) casings.splice(0, casings.length - 50);

  // Floating texts
  floatingTexts.forEach(t => { t.y -= 0.5; t.life--; });
  floatingTexts = floatingTexts.filter(t => t.life > 0);

  // Kill streak decay
  if (killStreakTimer > 0) killStreakTimer--;
  else killStreak = 0;

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.5) screenShake = 0;

  // Wave management (skip in PvP)
  if (!pvpMode) {
    waveTimer -= dt;
    if (enemies.length === 0 && waveTimer <= 0) {
      spawnWave();
    }
  } else {
    // PvP: spawn random powerups periodically
    waveTimer -= dt;
    if (waveTimer <= 0 && powerups.length < 2) {
      spawnPowerup();
      waveTimer = 300 + Math.random() * 200;
    }
  }

}

// Cached gradient map (key -> gradient)
const _gradientCache = {};

function drawShadow(x, entityY, entityW, groundY) {
  let dist = groundY - entityY;
  let maxDist = 300;
  let scale = Math.max(0.35, 1 - dist / maxDist);
  let shadowW = entityW * (0.7 + (1 - scale) * 0.4);
  let shadowH = shadowW * 0.25;
  let alpha = 0.4 * scale;
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(x, groundY, shadowW, shadowH, 0, 0, Math.PI * 2);
  ctx.fill();
}

function findShadowSurface(x, entityY, entityH) {
  let entityBottom = entityY + entityH;
  let bestY = GROUND;
  platforms.forEach(p => {
    if (x > p.x && x < p.x + p.w && p.y > entityBottom && p.y < bestY) {
      bestY = p.y;
    }
  });
  return bestY;
}

function hexToRgb(hex) {
  let key = hex;
  if (_gradientCache['rgb_' + key]) return _gradientCache['rgb_' + key];
  let result;
  if (hex && hex.startsWith('#')) {
    let h = hex.slice(1);
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    let r = parseInt(h.slice(0, 2), 16);
    let g = parseInt(h.slice(2, 4), 16);
    let b = parseInt(h.slice(4, 6), 16);
    result = [r||0, g||0, b||0];
  } else {
    result = [128, 128, 128];
  }
  _gradientCache['rgb_' + key] = result;
  return result;
}

function lighten(rgb, amt) {
  return [Math.min(255, rgb[0] + amt), Math.min(255, rgb[1] + amt), Math.min(255, rgb[2] + amt)];
}

function darken(rgb, amt) {
  return [Math.max(0, rgb[0] - amt), Math.max(0, rgb[1] - amt), Math.max(0, rgb[2] - amt)];
}

function rgbStr(rgb) { return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`; }

function make3DGradient(ctx, x, y, w, h, baseColor) {
  let rgb = typeof baseColor === 'string' ? hexToRgb(baseColor) : baseColor;
  let grad = ctx.createLinearGradient(x, y, x + w, y);
  grad.addColorStop(0, rgbStr(lighten(rgb, 70)));
  grad.addColorStop(0.35, rgbStr(lighten(rgb, 15)));
  grad.addColorStop(1, rgbStr(darken(rgb, 65)));
  return grad;
}

function makeHeadGradient(ctx, cx, cy, r, baseColor) {
  let rgb = typeof baseColor === 'string' ? hexToRgb(baseColor) : baseColor;
  let grad = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.05, cx, cy, r);
  grad.addColorStop(0, rgbStr(lighten(rgb, 80)));
  grad.addColorStop(0.5, rgbStr(lighten(rgb, 10)));
  grad.addColorStop(1, rgbStr(darken(rgb, 50)));
  return grad;
}

function makeLimbGradient(ctx, x1, y1, x2, y2, baseColor) {
  let rgb = typeof baseColor === 'string' ? hexToRgb(baseColor) : baseColor;
  let mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  let dx = x2 - x1, dy = y2 - y1;
  let nx = -dy, ny = dx;
  let len = Math.sqrt(nx * nx + ny * ny) || 1;
  nx /= len; ny /= len;
  let grad = ctx.createLinearGradient(mx + nx * 5, my + ny * 5, mx - nx * 5, my - ny * 5);
  grad.addColorStop(0, rgbStr(lighten(rgb, 55)));
  grad.addColorStop(0.45, rgbStr(rgb));
  grad.addColorStop(1, rgbStr(darken(rgb, 45)));
  return grad;
}

// ─── BACKDROP ───
function drawBackdrop(type) {
  let lvl = getCurrentLevel();
  let time = Date.now() * 0.001;

  if (type === 'city') {
