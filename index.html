<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gunslinger Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { display: block; border-radius: 4px; }
    #ui {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
const RELAY_SERVER = 'wss://gunslinger-relay.onrender.com';
const GAME_VERSION = 'v1.2';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 500;

// ─── PROCEDURAL SOUND EFFECTS ───
let audioCtx = null;
let noiseBuffer = null;
let audioInitialized = false;
let muted = false;

function initAudio() {
  if (audioInitialized) return;
  audioInitialized = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const bufferSize = audioCtx.sampleRate * 2;
  noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    output[i] = Math.random() * 2 - 1;
  }
}

function playTone(freq, type, duration, volume, freqEnd) {
  if (!audioCtx || muted) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (freqEnd !== undefined) {
    osc.frequency.linearRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
  }
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, volume, filterFreq) {
  if (!audioCtx || muted) return;
  const source = audioCtx.createBufferSource();
  source.buffer = noiseBuffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = filterFreq;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
  source.stop(audioCtx.currentTime + duration);
}

const SFX = {
  shoot_pistol() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Soft pop
    const body = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    body.type = 'sine';
    body.frequency.setValueAtTime(250, t);
    body.frequency.exponentialRampToValueAtTime(100, t + 0.06);
    bg.gain.setValueAtTime(0.08, t);
    bg.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    body.connect(bg); bg.connect(audioCtx.destination);
    body.start(t); body.stop(t + 0.08);
    // Gentle snap
    const snap = audioCtx.createBufferSource();
    snap.buffer = noiseBuffer;
    const sf = audioCtx.createBiquadFilter();
    sf.type = 'bandpass'; sf.frequency.value = 3000; sf.Q.value = 1;
    const sg = audioCtx.createGain();
    sg.gain.setValueAtTime(0.06, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    snap.connect(sf); sf.connect(sg); sg.connect(audioCtx.destination);
    snap.start(t); snap.stop(t + 0.04);
  },
  shoot_shotgun() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Warm boom
    const boom = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    boom.type = 'sine';
    boom.frequency.setValueAtTime(150, t);
    boom.frequency.exponentialRampToValueAtTime(50, t + 0.12);
    bg.gain.setValueAtTime(0.12, t);
    bg.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    boom.connect(bg); bg.connect(audioCtx.destination);
    boom.start(t); boom.stop(t + 0.15);
    // Soft spread noise
    const blast = audioCtx.createBufferSource();
    blast.buffer = noiseBuffer;
    const bf = audioCtx.createBiquadFilter();
    bf.type = 'lowpass'; bf.frequency.value = 1500;
    const blg = audioCtx.createGain();
    blg.gain.setValueAtTime(0.1, t);
    blg.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    blast.connect(bf); bf.connect(blg); blg.connect(audioCtx.destination);
    blast.start(t); blast.stop(t + 0.12);
  },
  shoot_smg() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Light tick
    const tick = audioCtx.createOscillator();
    const tg = audioCtx.createGain();
    tick.type = 'triangle';
    tick.frequency.setValueAtTime(350, t);
    tick.frequency.exponentialRampToValueAtTime(150, t + 0.03);
    tg.gain.setValueAtTime(0.06, t);
    tg.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    tick.connect(tg); tg.connect(audioCtx.destination);
    tick.start(t); tick.stop(t + 0.04);
    // Tiny puff
    const puff = audioCtx.createBufferSource();
    puff.buffer = noiseBuffer;
    const pf = audioCtx.createBiquadFilter();
    pf.type = 'bandpass'; pf.frequency.value = 2500; pf.Q.value = 1;
    const pg = audioCtx.createGain();
    pg.gain.setValueAtTime(0.04, t);
    pg.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
    puff.connect(pf); pf.connect(pg); pg.connect(audioCtx.destination);
    puff.start(t); puff.stop(t + 0.025);
  },
  shoot_rifle() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Firm thud
    const thud = audioCtx.createOscillator();
    const tg = audioCtx.createGain();
    thud.type = 'sine';
    thud.frequency.setValueAtTime(200, t);
    thud.frequency.exponentialRampToValueAtTime(60, t + 0.1);
    tg.gain.setValueAtTime(0.1, t);
    tg.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    thud.connect(tg); tg.connect(audioCtx.destination);
    thud.start(t); thud.stop(t + 0.12);
    // Smooth crack
    const crack = audioCtx.createBufferSource();
    crack.buffer = noiseBuffer;
    const cf = audioCtx.createBiquadFilter();
    cf.type = 'bandpass'; cf.frequency.value = 2000; cf.Q.value = 0.8;
    const cg = audioCtx.createGain();
    cg.gain.setValueAtTime(0.08, t);
    cg.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    crack.connect(cf); cf.connect(cg); cg.connect(audioCtx.destination);
    crack.start(t); crack.stop(t + 0.1);
    // Gentle echo tail
    const echo = audioCtx.createBufferSource();
    echo.buffer = noiseBuffer;
    const ef = audioCtx.createBiquadFilter();
    ef.type = 'lowpass'; ef.frequency.value = 800;
    const eg = audioCtx.createGain();
    eg.gain.setValueAtTime(0, t + 0.05);
    eg.gain.linearRampToValueAtTime(0.03, t + 0.07);
    eg.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    echo.connect(ef); ef.connect(eg); eg.connect(audioCtx.destination);
    echo.start(t); echo.stop(t + 0.25);
  },
  shoot_rpg() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Rocket whoosh
    const whoosh = audioCtx.createBufferSource();
    whoosh.buffer = noiseBuffer;
    const wf = audioCtx.createBiquadFilter();
    wf.type = 'bandpass'; wf.frequency.value = 400; wf.Q.value = 0.5;
    const wg = audioCtx.createGain();
    wg.gain.setValueAtTime(0.2, t);
    wg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    whoosh.connect(wf); wf.connect(wg); wg.connect(audioCtx.destination);
    whoosh.start(t); whoosh.stop(t + 0.3);
    // Low thud
    playTone(60, 'sine', 0.2, 0.18, 30);
  },
  grenadeThrow() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    playTone(300, 'sine', 0.1, 0.1, 500);
    playNoise(0.08, 0.08, 1200);
  },
  grenadeBounce() {
    playTone(400, 'triangle', 0.05, 0.08, 200);
  },
  grenadeExplode() {
    playNoise(0.4, 0.35, 250);
    playTone(40, 'sine', 0.4, 0.3, 20);
  },
  enemyShoot() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Soft distant pop
    const pop = audioCtx.createOscillator();
    const pg = audioCtx.createGain();
    pop.type = 'sine';
    pop.frequency.setValueAtTime(200, t);
    pop.frequency.exponentialRampToValueAtTime(80, t + 0.04);
    pg.gain.setValueAtTime(0.05, t);
    pg.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    pop.connect(pg); pg.connect(audioCtx.destination);
    pop.start(t); pop.stop(t + 0.05);
    playNoise(0.03, 0.03, 1500);
  },
  jump() {
    playTone(200, 'sine', 0.15, 0.12, 600);
  },
  doubleJump() {
    playTone(400, 'sine', 0.15, 0.12, 1000);
  },
  dash() {
    playNoise(0.15, 0.15, 600);
  },
  playerHit() {
    playTone(100, 'sine', 0.2, 0.2);
    playNoise(0.1, 0.15, 500);
  },
  playerDeath() {
    playTone(500, 'sawtooth', 0.4, 0.2, 100);
  },
  enemyHit() {
    playNoise(0.06, 0.1, 2000);
  },
  enemyDeath() {
    playNoise(0.2, 0.2, 400);
    playTone(80, 'square', 0.25, 0.15);
  },
  explosion() {
    playNoise(0.3, 0.3, 300);
    playTone(50, 'sine', 0.35, 0.25);
  },
  pickup() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    [523, 659, 784].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.15, t + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.15);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t + i * 0.08);
      osc.stop(t + i * 0.08 + 0.15);
    });
  },
  reload() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    // Magazine slide out — short descending tone
    const slideOut = audioCtx.createOscillator();
    const sg1 = audioCtx.createGain();
    slideOut.type = 'triangle';
    slideOut.frequency.setValueAtTime(800, t);
    slideOut.frequency.exponentialRampToValueAtTime(300, t + 0.08);
    sg1.gain.setValueAtTime(0.04, t);
    sg1.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    slideOut.connect(sg1); sg1.connect(audioCtx.destination);
    slideOut.start(t); slideOut.stop(t + 0.1);
    // Magazine slide in — ascending chime
    const slideIn = audioCtx.createOscillator();
    const sg2 = audioCtx.createGain();
    slideIn.type = 'triangle';
    slideIn.frequency.setValueAtTime(400, t + 0.15);
    slideIn.frequency.exponentialRampToValueAtTime(1200, t + 0.22);
    sg2.gain.setValueAtTime(0, t + 0.14);
    sg2.gain.linearRampToValueAtTime(0.05, t + 0.16);
    sg2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    slideIn.connect(sg2); sg2.connect(audioCtx.destination);
    slideIn.start(t + 0.14); slideIn.stop(t + 0.25);
    // Satisfying metallic snap at the end
    const snap = audioCtx.createBufferSource();
    snap.buffer = noiseBuffer;
    const sf = audioCtx.createBiquadFilter();
    sf.type = 'bandpass'; sf.frequency.value = 4500; sf.Q.value = 5;
    const sg3 = audioCtx.createGain();
    sg3.gain.setValueAtTime(0, t + 0.24);
    sg3.gain.linearRampToValueAtTime(0.06, t + 0.25);
    sg3.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    snap.connect(sf); sf.connect(sg3); sg3.connect(audioCtx.destination);
    snap.start(t + 0.24); snap.stop(t + 0.32);
  },
  waveStart() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    [0, 0.12].forEach(offset => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.12, t + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.08);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t + offset);
      osc.stop(t + offset + 0.08);
    });
  },
  levelComplete() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.15, t + i * 0.15 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t + i * 0.15);
      osc.stop(t + i * 0.15 + 0.3);
    });
  },
  victory() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    [523, 659, 784, 1047, 1319].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.18);
      gain.gain.linearRampToValueAtTime(0.18, t + i * 0.18 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.45);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t + i * 0.18);
      osc.stop(t + i * 0.18 + 0.45);
    });
  },
  gameOver() {
    if (!audioCtx || muted) return;
    const t = audioCtx.currentTime;
    [400, 300, 200].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.25);
      gain.gain.linearRampToValueAtTime(0.18, t + i * 0.25 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.25 + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t + i * 0.25);
      osc.stop(t + i * 0.25 + 0.4);
    });
  },
  menuSelect() {
    playTone(660, 'square', 0.1, 0.12);
  },
  shieldUp() {
    playTone(440, 'sine', 0.12, 0.1, 880);
  },
  shieldBlock() {
    playTone(200, 'triangle', 0.08, 0.15);
    playNoise(0.05, 0.1, 1500);
  },
};

// ─── PROCEDURAL BACKGROUND MUSIC ───
let musicGain = null;
let musicPlaying = false;
let musicState = '';
let musicNodes = [];
let musicIntervals = [];
let musicStep = 0;

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} try { n.disconnect(); } catch(e) {} });
  musicNodes = [];
  musicIntervals.forEach(id => clearInterval(id));
  musicIntervals = [];
  musicPlaying = false;
  musicState = '';
}

// Helper: play a filtered note with attack/release envelope
function musicNote(freq, type, vol, dur, filterFreq, delay) {
  if (muted) return;
  const t = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter();
  osc.type = type;
  osc.frequency.value = freq;
  f.type = 'lowpass';
  f.frequency.value = filterFreq || 2000;
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.setValueAtTime(vol, t + dur * 0.6);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(f);
  f.connect(g);
  g.connect(musicGain);
  osc.start(t);
  osc.stop(t + dur);
}

// Helper: play a chord (array of freqs)
function musicChord(freqs, type, vol, dur, filterFreq, delay) {
  freqs.forEach(freq => musicNote(freq, type, vol / freqs.length, dur, filterFreq, delay));
}

// Helper: kick drum
function musicKick(vol, delay) {
  if (muted) return;
  const t = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.exponentialRampToValueAtTime(35, t + 0.15);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(g);
  g.connect(musicGain);
  osc.start(t);
  osc.stop(t + 0.2);
}

// Helper: snare hit
function musicSnare(vol, delay) {
  if (muted) return;
  const t = audioCtx.currentTime + (delay || 0);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer;
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass';
  f.frequency.value = 4000;
  f.Q.value = 0.8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  src.connect(f);
  f.connect(g);
  g.connect(musicGain);
  src.start(t);
  src.stop(t + 0.15);
  // Body tone
  const body = audioCtx.createOscillator();
  const bg = audioCtx.createGain();
  body.type = 'triangle';
  body.frequency.value = 200;
  bg.gain.setValueAtTime(vol * 0.5, t);
  bg.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  body.connect(bg);
  bg.connect(musicGain);
  body.start(t);
  body.stop(t + 0.08);
}

// Helper: hi-hat
function musicHihat(vol, open, delay) {
  if (muted) return;
  const t = audioCtx.currentTime + (delay || 0);
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer;
  const f = audioCtx.createBiquadFilter();
  f.type = 'highpass';
  f.frequency.value = 7000;
  const g = audioCtx.createGain();
  const dur = open ? 0.12 : 0.04;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f);
  f.connect(g);
  g.connect(musicGain);
  src.start(t);
  src.stop(t + dur);
}

function startMusic(type) {
  if (!audioCtx || musicState === type) return;
  stopMusic();
  musicState = type;
  musicPlaying = true;

  if (!musicGain) {
    musicGain = audioCtx.createGain();
    musicGain.connect(audioCtx.destination);
  }
  musicGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  musicStep = 0;

  if (type === 'menu') {
    // ── Haunting western atmosphere ──
    // Warm detuned drone in Am
    [109, 111, 55.5].forEach(freq => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const f = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = freq;
      f.type = 'lowpass';
      f.frequency.value = 300;
      g.gain.value = 0.35;
      osc.connect(f);
      f.connect(g);
      g.connect(musicGain);
      osc.start();
      musicNodes.push(osc);
    });

    // Slow haunting melody — Am pentatonic with long sustain
    // A4  C5  E5  D5 | C5  A4  G4  A4 | E4  G4  A4  C5 | A4  G4  E4  G4
    const melody = [440, 523.25, 659.25, 587.33, 523.25, 440, 392, 440,
                    329.63, 392, 440, 523.25, 440, 392, 329.63, 392];
    musicIntervals.push(setInterval(() => {
      if (muted || !musicPlaying) return;
      const note = melody[musicStep % melody.length];
      musicNote(note, 'sine', 0.18, 0.9, 1200);
      // Echo/delay effect — quieter repeat
      musicNote(note * 1.001, 'sine', 0.08, 0.7, 800, 0.25);
      musicStep++;
    }, 600));

    // Slow chord changes every 4 melody steps
    const chords = [
      [220, 261.63, 329.63],    // Am
      [174.61, 220, 261.63],    // F
      [196, 246.94, 329.63],    // Em
      [220, 261.63, 329.63],    // Am
    ];
    let chordStep = 0;
    musicIntervals.push(setInterval(() => {
      if (muted || !musicPlaying) return;
      const chord = chords[chordStep % chords.length];
      musicChord(chord, 'sine', 0.25, 2.2, 600);
      chordStep++;
    }, 2400));

  } else if (type === 'action') {
    // ── Driving dark synth ──
    // BPM ~128, 8th note = ~234ms
    const stepMs = 234;

    // Bass line follows Am - F - Am - Em chord progression (2 bars each = 16 steps)
    // Groovy rhythmic pattern with rests (0 = rest)
    const bass = [110, 0, 110, 110, 0, 130.81, 110, 0,
                  87.31, 0, 87.31, 110, 0, 87.31, 98, 0,
                  110, 0, 110, 110, 0, 130.81, 110, 0,
                  82.41, 0, 82.41, 110, 98, 82.41, 110, 0];

    // Lead melody riff — plays on top, pentatonic Am
    // 0 = rest, plays every 2 steps offset
    const lead = [0, 440, 0, 523.25, 659.25, 0, 523.25, 440,
                  0, 392, 0, 440, 523.25, 0, 440, 392,
                  0, 440, 0, 523.25, 659.25, 0, 587.33, 523.25,
                  0, 440, 0, 392, 329.63, 0, 392, 440];

    // Chord stabs on downbeats (every 8 steps)
    const stabs = [
      [220, 261.63, 329.63],    // Am
      [174.61, 220, 261.63],    // F
      [220, 261.63, 329.63],    // Am
      [164.81, 246.94, 329.63], // Em
    ];

    musicIntervals.push(setInterval(() => {
      if (muted || !musicPlaying) return;
      const s = musicStep % 32;

      // Bass
      const bassNote = bass[s];
      if (bassNote > 0) {
        musicNote(bassNote, 'sawtooth', 0.35, 0.2, 350);
        // Sub bass layer
        musicNote(bassNote / 2, 'sine', 0.25, 0.18, 200);
      }

      // Lead melody
      const leadNote = lead[s];
      if (leadNote > 0) {
        musicNote(leadNote, 'triangle', 0.15, 0.3, 1500);
      }

      // Chord stabs every 8 steps
      if (s % 8 === 0) {
        const chord = stabs[Math.floor(s / 8) % stabs.length];
        musicChord(chord, 'sawtooth', 0.2, 0.15, 800);
      }

      // Drums: Kick on 0,4,8,12... Snare on 4,12,20,28
      if (s % 4 === 0) musicKick(0.5);
      if (s % 8 === 4) musicSnare(0.3);

      // Hi-hats: every step, open on offbeats
      musicHihat(0.08, s % 2 === 1);

      musicStep++;
    }, stepMs));

  } else if (type === 'boss') {
    // ── Heavy boss theme — darker, faster, more intense ──
    // BPM ~155, 8th note = ~194ms
    const stepMs = 194;

    // Menacing bass in Em — chromatic tension
    const bass = [82.41, 82.41, 0, 82.41, 87.31, 82.41, 0, 77.78,
                  82.41, 82.41, 0, 82.41, 92.50, 87.31, 82.41, 0,
                  65.41, 65.41, 0, 65.41, 69.30, 65.41, 0, 73.42,
                  82.41, 82.41, 0, 98, 87.31, 82.41, 73.42, 82.41];

    // Aggressive lead — minor scale runs
    const lead = [659.25, 0, 587.33, 523.25, 0, 493.88, 523.25, 0,
                  587.33, 0, 659.25, 698.46, 0, 659.25, 587.33, 0,
                  523.25, 0, 493.88, 440, 0, 493.88, 523.25, 0,
                  587.33, 0, 659.25, 587.33, 523.25, 0, 493.88, 523.25];

    // Power chord stabs
    const stabs = [
      [164.81, 246.94, 329.63],  // Em
      [146.83, 220, 293.66],     // Dm
      [130.81, 196, 261.63],     // C
      [123.47, 185.00, 246.94],  // B
    ];

    musicIntervals.push(setInterval(() => {
      if (muted || !musicPlaying) return;
      const s = musicStep % 32;

      // Heavy bass with distortion-like overtone
      const bassNote = bass[s];
      if (bassNote > 0) {
        musicNote(bassNote, 'square', 0.3, 0.16, 280);
        musicNote(bassNote / 2, 'sine', 0.3, 0.16, 150);
        // Gritty overtone
        musicNote(bassNote * 1.5, 'sawtooth', 0.08, 0.1, 400);
      }

      // Aggressive lead
      const leadNote = lead[s];
      if (leadNote > 0) {
        musicNote(leadNote, 'sawtooth', 0.12, 0.2, 2000);
      }

      // Power chord stabs every 8 steps
      if (s % 8 === 0) {
        const chord = stabs[Math.floor(s / 8) % stabs.length];
        musicChord(chord, 'sawtooth', 0.25, 0.12, 1000);
      }

      // Double-time kick (every 2 steps)
      if (s % 2 === 0) musicKick(0.55);
      // Snare on 4, 12, 20, 28
      if (s % 8 === 4) musicSnare(0.35);
      // Extra snare hits for intensity
      if (s === 14 || s === 30) musicSnare(0.2);

      // Rapid hi-hats
      musicHihat(0.06, false);
      musicHihat(0.04, false, stepMs / 2000);

      musicStep++;
    }, stepMs));
  }
}

function updateMusic() {
  if (!audioCtx) return;
  if (muted) {
    if (musicGain) musicGain.gain.setValueAtTime(0, audioCtx.currentTime);
    return;
  }
  if (musicGain) musicGain.gain.setValueAtTime(0.3, audioCtx.currentTime);

  let targetMusic = '';
  if (state === 'menu' || state === 'online-menu' || state === 'online-pvp-menu' || state === 'online-host' || state === 'online-join') {
    targetMusic = 'menu';
  } else if (state === 'playing') {
    if (pvpMode) {
      targetMusic = 'boss';
    } else {
      let lvl = getCurrentLevel();
      let isBossWave = lvl.hasBoss && wave === wavesPerLevel;
      targetMusic = isBossWave ? 'boss' : 'action';
    }
  } else if (state === 'pvpIntro') {
    targetMusic = 'boss';
  } else if (state === 'levelIntro' || state === 'levelComplete') {
    targetMusic = 'action';
  } else if (state === 'dead' || state === 'won' || state === 'pvpWin') {
    targetMusic = '';
  }

  if (targetMusic !== musicState) {
    if (targetMusic === '') {
      stopMusic();
    } else {
      startMusic(targetMusic);
    }
  }
}

document.addEventListener('keydown', e => {
  let lk = e.key.toLowerCase();
  keys[lk] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
  initAudio();
  if (e.key.toLowerCase() === 'm' && state !== 'online-join') { muted = !muted; return; }

  // Pause menu
  if (e.key === 'Escape' && state === 'playing') {
    paused = !paused;
    pauseSelection = 0;
    if (onlineMode) wsSend({ type: 'pause', paused: paused });
    return;
  }
  if (paused) {
    if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') {
      pauseSelection = 0;
      SFX.menuSelect();
    } else if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {
      pauseSelection = 1;
      SFX.menuSelect();
    } else if (e.key === 'Enter' || e.key === ' ') {
      if (pauseSelection === 0) {
        paused = false;
        if (onlineMode) wsSend({ type: 'pause', paused: false });
      } else {
        paused = false;
        pvpMode = false;
        if (onlineMode) {
          wsSend({ type: 'disconnect' });
          cleanupOnline();
        }
        state = 'menu';
      }
    }
    return;
  }

  // Client input: queue events and predict locally for instant feedback
  if (onlineMode && isClient && (state === 'playing' || state === 'pvpIntro' || state === 'levelIntro')) {
    let k = e.key.toLowerCase();
    if (state === 'playing') {
      if (k === 'w' || k === ' ' || e.key === 'ArrowUp') {
        clientInputState.events.push('jump');
        // Client-side jump prediction
        if (player2 && player2.alive && player2.jumps > 0) {
          if (player2.jumps === 1) SFX.doubleJump(); else SFX.jump();
          player2.vy = player2.jumps === 2 ? JUMP_FORCE : DOUBLE_JUMP_FORCE;
          player2.onGround = false;
          player2.jumps--;
          spawnJumpDust(player2);
          if (player2.jumps === 0) spawnDoubleJumpEffect(player2);
        }
      }
      if (k === 'q' || e.key === 'Shift') {
        clientInputState.events.push('dash');
        // Client-side dash prediction
        if (player2 && player2.alive && player2.dashCooldown <= 0 && !player2.dashing) {
          performDash(player2);
        }
      }
      if (k === 'r') {
        clientInputState.events.push('reload');
      }
      if (k === 'g') {
        clientInputState.events.push('grenade');
      }
    }
    return;
  }

  if (state === 'menu') {
    if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') {
      menuSelection = (menuSelection - 1 + 5) % 5;
      SFX.menuSelect();
      return;
    }
    if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {
      menuSelection = (menuSelection + 1) % 5;
      SFX.menuSelect();
      return;
    }
    if (e.key === 'Enter' || e.key === ' ') {
      if (menuSelection === 0) { coopMode = false; pvpMode = false; startGame(); }
      else if (menuSelection === 1) { coopMode = true; pvpMode = false; startGame(); }
      else if (menuSelection === 2) { coopMode = true; pvpMode = true; startPvpGame(); }
      else if (menuSelection === 3) { state = 'online-menu'; onlineMenuSelection = 0; SFX.menuSelect(); }
      else if (menuSelection === 4) { state = 'online-pvp-menu'; onlineMenuSelection = 0; SFX.menuSelect(); }
      return;
    }
    return;
  }

  if (state === 'online-menu') {
    if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') { onlineMenuSelection = 0; SFX.menuSelect(); return; }
    if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') { onlineMenuSelection = 1; SFX.menuSelect(); return; }
    if (e.key === 'Enter' || e.key === ' ') {
      SFX.menuSelect();
      pvpMode = false;
      if (onlineMenuSelection === 0) {
        state = 'online-host';
        startHosting();
      } else {
        state = 'online-join';
        roomCodeInput = '';
        connectionStatus = '';
      }
      return;
    }
    if (e.key === 'Escape') { state = 'menu'; return; }
    return;
  }

  if (state === 'online-pvp-menu') {
    if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') { onlineMenuSelection = 0; SFX.menuSelect(); return; }
    if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') { onlineMenuSelection = 1; SFX.menuSelect(); return; }
    if (e.key === 'Enter' || e.key === ' ') {
      SFX.menuSelect();
      pvpMode = true;
      if (onlineMenuSelection === 0) {
        state = 'online-host';
        startHosting();
      } else {
        state = 'online-join';
        roomCodeInput = '';
        connectionStatus = '';
      }
      return;
    }
    if (e.key === 'Escape') { state = 'menu'; return; }
    return;
  }

  if (state === 'online-host') {
    if (e.key === 'Escape') {
      cleanupOnline();
      state = pvpMode ? 'online-pvp-menu' : 'online-menu';
      return;
    }
    return;
  }

  if (state === 'online-join') {
    if (e.key === 'Escape') {
      cleanupOnline();
      state = pvpMode ? 'online-pvp-menu' : 'online-menu';
      return;
    }
    if (e.key === 'Backspace') {
      roomCodeInput = roomCodeInput.slice(0, -1);
      connectionStatus = '';
      return;
    }
    if (e.key === 'Enter' && roomCodeInput.length === 4) {
      joinRoom(roomCodeInput);
      return;
    }
    if (/^[a-zA-Z]$/.test(e.key) && roomCodeInput.length < 4) {
      roomCodeInput += e.key.toUpperCase();
      return;
    }
    return;
  }

  // Client cannot trigger restarts
  if (onlineMode && isClient) {
    if (state === 'dead' || state === 'won' || state === 'levelComplete' || state === 'pvpWin') return;
  }

  if (state === 'pvpWin' && (e.key === 'Enter' || e.key === ' ')) { startPvpGame(); return; }
  if (state === 'pvpWin' && e.key === 'Escape') { pvpMode = false; if (onlineMode) cleanupOnline(); state = 'menu'; return; }
  if (state === 'dead' && (e.key === 'Enter' || e.key === ' ')) { startGame(); return; }
  if (state === 'won' && (e.key === 'Enter' || e.key === ' ')) { startGame(); return; }
  if (state === 'demo-locked') {
    if (e.key === 'Escape') { state = 'menu'; return; }
    if (e.key === 'Backspace') { unlockCodeInput = unlockCodeInput.slice(0, -1); return; }
    if (e.key === 'Enter') {
      if (unlockCodeInput.toUpperCase() === UNLOCK_CODE) {
        fullVersionUnlocked = true;
        localStorage.setItem('gunslingerFull', 'true');
        startLevel();
      } else {
        unlockCodeInput = '';
      }
      return;
    }
    if (e.key.length === 1 && unlockCodeInput.length < 20) {
      unlockCodeInput += e.key.toUpperCase();
    }
    return;
  }
  if (state === 'levelComplete' && (e.key === 'Enter' || e.key === ' ')) {
    level++;
    if (level > DEMO_LEVELS && !fullVersionUnlocked) {
      state = 'demo-locked';
      unlockCodeInput = '';
      return;
    }
    startLevel();
    return;
  }

  if (state === 'playing') {
    // P1 Jump (w always, ArrowUp/Space in solo or online)
    if ((e.key.toLowerCase() === 'w' || ((!coopMode || onlineMode) && (e.key === ' ' || e.key === 'ArrowUp'))) && player.alive && player.jumps > 0) {
      if (player.jumps === 1) SFX.doubleJump(); else SFX.jump();
      player.vy = player.jumps === 2 ? JUMP_FORCE : DOUBLE_JUMP_FORCE;
      player.onGround = false;
      player.jumps--;
      spawnJumpDust(player);
      if (player.jumps === 0) spawnDoubleJumpEffect(player);
    }
    // P2 Jump (local co-op only)
    if (coopMode && !onlineMode && e.key === 'ArrowUp' && player2 && player2.alive && player2.jumps > 0) {
      if (player2.jumps === 1) SFX.doubleJump(); else SFX.jump();
      player2.vy = player2.jumps === 2 ? JUMP_FORCE : DOUBLE_JUMP_FORCE;
      player2.onGround = false;
      player2.jumps--;
      spawnJumpDust(player2);
      if (player2.jumps === 0) spawnDoubleJumpEffect(player2);
    }
    // P1 Dash (q always, Shift in solo or online)
    if ((e.key.toLowerCase() === 'q' || ((!coopMode || onlineMode) && e.key === 'Shift')) && player.alive && player.dashCooldown <= 0 && !player.dashing) {
      performDash(player);
    }
    // P2 Dash (local co-op only)
    if (coopMode && !onlineMode && e.key === "'" && player2 && player2.alive && player2.dashCooldown <= 0 && !player2.dashing) {
      performDash(player2);
    }
    // P1 Reload
    if (e.key.toLowerCase() === 'r' && player.alive && !player.reloading && player.ammo < player.maxAmmo) {
      player.reloading = true;
      player.reloadTimer = 40;
    }
    // P2 Reload (local co-op only)
    if (coopMode && !onlineMode && e.key === ';' && player2 && player2.alive && !player2.reloading && player2.ammo < player2.maxAmmo) {
      player2.reloading = true;
      player2.reloadTimer = 40;
    }
    // P1 Grenade
    if (e.key.toLowerCase() === 'g' && player.alive) {
      throwGrenade(player);
    }
    // P2 Grenade (local co-op only)
    if (coopMode && !onlineMode && e.key === ',' && player2 && player2.alive) {
      throwGrenade(player2);
    }
  }
});

// ─── SPAWN ───
function spawnWave() {
  wave++;
  let lvl = getCurrentLevel();

  // Check if level is complete
  if (wave > wavesPerLevel) {
    if (level >= levels.length) {
      // Game won!
      SFX.victory();
      state = 'won';
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('shooterBest', highScore.toString());
      }
      return;
    }
    completeLevel();
    return;
  }

  let count = Math.min(2 + wave + level, 14);
  let types = lvl.enemyTypes;

  // Last wave spawns a boss (or megaboss)
  if (lvl.hasBoss && wave === wavesPerLevel) {
    spawnEnemy(lvl.hasMegaBoss ? 'megaboss' : 'boss');
    count = Math.floor(count / 2);
  }

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (state !== 'playing') return;
      let type = types[Math.floor(Math.random() * types.length)];
      spawnEnemy(type);
    }, i * 400);
  }

  // Power-up drop
  if (wave % 2 === 0) {
    setTimeout(() => spawnPowerup(), 1000);
  }

  waveTimer = 300 + count * 60;
  SFX.waveStart();
  addFloatingText(`WAVE ${wave}/${wavesPerLevel}`, canvas.width / 2, 100, '#fff', 28, 90);
}

function spawnEnemy(type) {
  let def = enemyTypes[type];
  let lvl = getCurrentLevel();
  let scale = lvl.enemyScale;
  let fromRight = Math.random() > 0.5;
  let x = fromRight ? canvas.width + 30 : -30;
  let y = GROUND;
  // Flying enemies spawn at their fly height
  if (def.flying) {
    y = GROUND - def.flyHeight - Math.random() * 60;
  } else if (Math.random() > 0.5 && platforms.length > 0) {
    // Sometimes spawn on platforms
    let p = platforms[Math.floor(Math.random() * platforms.length)];
    y = p.y - def.h;
    x = p.x + Math.random() * p.w;
  }
  let e = {
    x, y, ...def, type,
    health: Math.ceil(def.health * scale),
    maxHealth: Math.ceil(def.health * scale),
    speed: def.speed * (0.9 + scale * 0.2),
    bulletSpeed: def.bulletSpeed * (0.9 + scale * 0.15),
    facing: fromRight ? -1 : 1,
    shootTimer: Math.floor(Math.random() * def.shootRate),
    vy: 0,
    hit: 0,
    deathTimer: 0,
    alive: true,
    patrolDir: fromRight ? -1 : 1,
  };
  if (def.flying) {
    e.flyBaseY = y;
    e.flyPhase = Math.random() * Math.PI * 2;
  }
  if (def.burstCount) {
    e.burstRemaining = 0;
    e.burstDelay = 0;
  }
  if (def.mega) {
    e._jumpTimer = 120;
    e._shockwaveCooldown = 0;
  }
  enemies.push(e);
}

function spawnExplosion(x, y, color = '#ff9f43', count = 20) {
  screenShake = 8;

    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 15, maxLife: 15, color: '#fff8dc', size: 2 + Math.random() * 2,
      type: 'spark', glow: true
    });
  }
  // Layer 2: mid fire particles (medium, orange)
  for (let i = 0; i < Math.floor(count * 0.4); i++) {
    let angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    let speed = Math.random() * 5 + 2;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
      life: 25, maxLife: 25, color, size: 3 + Math.random() * 4,
      type: 'fire', glow: false
    });
  }
  // Layer 3: outer smoke puffs (large, slow, gray, grows)
  let smokeCount = Math.min(MAX_SMOKE - smokeParticles.length, Math.floor(count * 0.3));
  for (let i = 0; i < smokeCount; i++) {
    let angle = Math.random() * Math.PI * 2;
    let sp = {
      x, y, vx: Math.cos(angle) * (Math.random() * 1.5 + 0.5), vy: -(Math.random() * 1 + 0.5),
      life: 55, maxLife: 55, color: '#666', size: 4 + Math.random() * 3,
      type: 'smoke', glow: false

  }
}

// ─── SHOOTING ───
function playerShoot(p) {
  p = p || player;
  if (p.shielding || p.shootCooldown > 0 || p.reloading || p.ammo <= 0) return;

  let wep = weapons[p.weapon];
  p.shootCooldown = wep.fireRate;
  let pellets = wep.pellets || 1;

  for (let i = 0; i < pellets; i++) {
    let spread = (Math.random() - 0.5) * wep.spread * 2;
    let bx = p.x + p.facing * 20;
    let by = p.y + 14;
    bullets.push({
      x: bx, y: by,
      vx: Math.cos(spread) * wep.speed * p.facing,
      vy: Math.sin(spread) * wep.speed,
      damage: wep.damage,
      color: wep.color,
      size: wep.size,
      isPlayer: true,
      owner: p === player ? 1 : 2,
      life: 80,
      trail: [],
      explosive: !!wep.explosive,
    });
  }

  p.ammo--;
  if (p.ammo <= 0) {
    p.reloading = true;
    p.reloadTimer = 50;
  }

  if (SFX['shoot_' + p.weapon]) SFX['shoot_' + p.weapon]();
  spawnMuzzleFlash(p.x + p.facing * 24, p.y + 14, p.facing);
  spawnCasing(p.x, p.y + 10, p.facing);
  screenShake = Math.max(screenShake, wep.fireRate > 15 ? 4 : 2);
}

function throwGrenade(p) {
  if (!p || !p.alive || p.grenadeCount <= 0 || p.grenadeCooldown > 0) return;
  p.grenadeCount--;
  p.grenadeCooldown = 90;
  SFX.grenadeThrow();
  grenades.push({
    x: p.x + p.facing * 10,
    y: p.y + 10,
    vx: p.facing * 5,
    vy: -7,
    fuse: 90,
    bounced: false,
    rotation: 0,
    owner: p,
  });
}

function rpgExplode(x, y) {
  let wep = weapons.rpg;
  SFX.grenadeExplode();
  spawnExplosion(x, y, '#ff5252', 30);
  screenShake = 12;
  // Area damage to enemies
  enemies.forEach(e => {
    if (!e.alive || e.dying) return;
    let dx = e.x - x;
    let dy = (e.y + e.h / 2) - y;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < wep.blastRadius) {
      let falloff = 1 - (dist / wep.blastRadius);
      let dmg = Math.ceil(wep.damage * falloff);
      e.health -= dmg;
      e.hit = 6;
      spawnBlood(e.x, e.y + e.h / 2);
      if (e.health <= 0 && !e.dying) {
        e.dying = true;
        e.deathTimer = 45;
        e.deathVx = (dx / (dist || 1)) * 4;
        e.deathVy = -4 - Math.random() * 3;
        e.deathRotation = 0;
        e.deathRotSpeed = (Math.random() - 0.5) * 0.2;
        score += e.score;
        killStreak++;
        killStreakTimer = 120;
        if (killStreak >= 3) {
          let mult = Math.min(killStreak, 10);
          let bonus = e.score * (mult - 1);
          score += bonus;
          addFloatingText(`${killStreak}x COMBO! +${bonus}`, e.x, e.y - 20, '#ffe66d', 20, 60);
        }
        SFX.enemyDeath();
        spawnExplosion(e.x, e.y + e.h / 2, e.color);
        addFloatingText(`+${e.score}`, e.x, e.y, '#fff', 14, 40);
      }
    }
  });
}
