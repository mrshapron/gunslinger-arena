    ctx.lineTo(180, GROUND); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(700, GROUND); ctx.lineTo(740, GROUND - 140); ctx.lineTo(800, GROUND - 100);
    ctx.lineTo(860, GROUND); ctx.closePath(); ctx.fill();
    // Lava rivers (animated orange strips)
    ctx.globalAlpha = 0.4 + Math.sin(time * 3) * 0.15;
    ctx.fillStyle = '#ff5500';
    ctx.fillRect(0, GROUND + 3, canvas.width * 0.3, 5);
    ctx.fillRect(canvas.width * 0.45, GROUND + 3, canvas.width * 0.15, 5);
    ctx.fillRect(canvas.width * 0.7, GROUND + 3, canvas.width * 0.3, 5);
    ctx.globalAlpha = 1;
    // Rising ember particles
    ctx.fillStyle = 'rgba(255,150,30,0.6)';
    for (let i = 0; i < 15; i++) {
      let ex = 350 + Math.sin(time * 1.5 + i * 2) * 100 + i * 15;
      let ey = GROUND - 50 - ((time * 40 + i * 30) % 300);
      let ea = Math.max(0, 1 - (GROUND - 50 - ey) / 300);
      ctx.globalAlpha = ea * 0.6;
      ctx.beginPath(); ctx.arc(ex, ey, 1.5 + Math.random(), 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Ash in air
    ctx.fillStyle = 'rgba(80,60,50,0.3)';
    for (let i = 0; i < 20; i++) {
      let ax = (i * 47 + time * 10) % canvas.width;
      let ay = (i * 29 + time * 8) % GROUND;
      ctx.beginPath(); ctx.arc(ax, ay, 1.2, 0, Math.PI * 2); ctx.fill();
    }

  } else if (type === 'laboratory') {
    // The Laboratory - glass tubes, monitors, sparking wires
    // Tall glass tubes with bubbling liquid
    let tubes = [
      { x: 60, h: 200, c: 'rgba(0,255,100,0.2)' },
      { x: 200, h: 180, c: 'rgba(0,150,255,0.2)' },
      { x: 650, h: 220, c: 'rgba(200,0,255,0.2)' },
      { x: 800, h: 190, c: 'rgba(255,200,0,0.2)' },
    ];
    tubes.forEach(t => {
      let ty = GROUND - t.h;
      // Tube glass
      ctx.strokeStyle = 'rgba(100,200,200,0.3)';
      ctx.lineWidth = 2;
      ctx.strokeRect(t.x, ty, 30, t.h);
      // Liquid fill (animated level)
      let fillH = t.h * (0.6 + Math.sin(time + t.x) * 0.1);
      ctx.fillStyle = t.c;
      ctx.fillRect(t.x + 2, GROUND - fillH, 26, fillH);
      // Bubbles
      for (let b = 0; b < 4; b++) {
        let bx = t.x + 5 + Math.sin(time * 2 + b * 2 + t.x) * 10;
        let by = GROUND - fillH + ((time * 50 + b * 30) % fillH);
        ctx.fillStyle = 'rgba(200,255,200,0.4)';
        ctx.beginPath(); ctx.arc(bx + 10, GROUND - by, 2, 0, Math.PI * 2); ctx.fill();
      }
    });
    // Blinking monitors
    let monitors = [
      { x: 350, y: GROUND - 100, w: 35, h: 25 },
      { x: 420, y: GROUND - 120, w: 30, h: 20 },
      { x: 500, y: GROUND - 90, w: 35, h: 25 },
    ];
    monitors.forEach(m => {
      ctx.fillStyle = 'rgba(10,10,10,0.6)';
      ctx.fillRect(m.x, m.y, m.w, m.h);
      let screenOn = Math.sin(time * 3 + m.x) > -0.3;
      if (screenOn) {
        ctx.fillStyle = 'rgba(0,255,80,0.25)';
        ctx.fillRect(m.x + 2, m.y + 2, m.w - 4, m.h - 4);
        // Scan lines
        for (let sy = m.y + 4; sy < m.y + m.h - 2; sy += 3) {
          ctx.fillStyle = 'rgba(0,200,60,0.15)';
          ctx.fillRect(m.x + 3, sy, m.w - 6, 1);
        }
      }
      // Monitor stand
      ctx.fillStyle = 'rgba(40,40,40,0.5)';
      ctx.fillRect(m.x + m.w / 2 - 3, m.y + m.h, 6, 10);
    });
    // Sparking wires
    ctx.strokeStyle = 'rgba(100,255,200,0.4)';
    ctx.lineWidth = 1;
    [280, 560].forEach(wx => {
      ctx.beginPath();
      ctx.moveTo(wx, GROUND - 160);
      ctx.quadraticCurveTo(wx + 30, GROUND - 120, wx + 10, GROUND - 80);
      ctx.stroke();
      // Spark
      if (Math.sin(time * 8 + wx) > 0.7) {
        ctx.fillStyle = 'rgba(200,255,255,0.7)';
        ctx.beginPath(); ctx.arc(wx + 10, GROUND - 80, 3, 0, Math.PI * 2); ctx.fill();
      }
    });
    // Equipment silhouettes at base
    ctx.fillStyle = 'rgba(15,25,20,0.4)';
    ctx.fillRect(100, GROUND - 40, 80, 40);
    ctx.fillRect(720, GROUND - 50, 60, 50);

  } else if (type === 'pirate') {
    // Pirate Bay - ships, ocean, docks
    // Ocean waves (sine curves at ground level)
    ctx.strokeStyle = 'rgba(30,80,150,0.35)';
    ctx.lineWidth = 2;
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      for (let x = 0; x < canvas.width; x += 5) {
        let y = GROUND + 5 + w * 5 + Math.sin(x * 0.02 + time * (1.5 - w * 0.3) + w) * 4;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // Ship masts with sails (left ship)
    ctx.fillStyle = 'rgba(50,25,10,0.5)';
    ctx.fillRect(130, GROUND - 80, 90, 30); // hull
    ctx.strokeStyle = 'rgba(60,30,10,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(160, GROUND - 80); ctx.lineTo(160, GROUND - 220); ctx.stroke();
    // Sail
    ctx.fillStyle = 'rgba(220,200,170,0.3)';
    ctx.beginPath();
    ctx.moveTo(160, GROUND - 200); ctx.lineTo(195, GROUND - 170);
    ctx.lineTo(195, GROUND - 120); ctx.lineTo(160, GROUND - 110);
    ctx.closePath(); ctx.fill();
    // Right ship
    ctx.fillStyle = 'rgba(50,25,10,0.5)';
    ctx.fillRect(650, GROUND - 70, 100, 25);
    ctx.strokeStyle = 'rgba(60,30,10,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(700, GROUND - 70); ctx.lineTo(700, GROUND - 200); ctx.stroke();
    ctx.fillStyle = 'rgba(220,200,170,0.3)';
    ctx.beginPath();
    ctx.moveTo(700, GROUND - 180); ctx.lineTo(735, GROUND - 150);
    ctx.lineTo(735, GROUND - 100); ctx.lineTo(700, GROUND - 90);
    ctx.closePath(); ctx.fill();
    // Dock posts
    ctx.fillStyle = 'rgba(60,35,15,0.5)';
    [350, 400, 450, 500].forEach(dx => {
      ctx.fillRect(dx - 5, GROUND - 50, 10, 55);
      // Rope
      ctx.strokeStyle = 'rgba(140,110,60,0.3)';
      ctx.lineWidth = 1;
      if (dx < 500) {
        ctx.beginPath(); ctx.moveTo(dx, GROUND - 45);
        ctx.quadraticCurveTo(dx + 25, GROUND - 35, dx + 50, GROUND - 45);
        ctx.stroke();
      }
    });
    // Distant islands
    ctx.fillStyle = 'rgba(20,40,20,0.25)';
    ctx.beginPath();
    ctx.moveTo(820, GROUND - 20); ctx.quadraticCurveTo(860, GROUND - 60, 900, GROUND - 20);
    ctx.closePath(); ctx.fill();
    // Cannon barrels on ships
    ctx.fillStyle = 'rgba(30,30,30,0.5)';
    ctx.fillRect(215, GROUND - 65, 15, 5);
    ctx.fillRect(645, GROUND - 58, 15, 5);

  } else if (type === 'void') {
    // The Void - deep space with nebulae and asteroids
    // Distant nebula clouds (radial gradients)
    let nebs = [
      { x: 150, y: 120, r: 100, c1: 'rgba(80,20,120,0.15)', c2: 'rgba(80,20,120,0)' },
      { x: 600, y: 80, r: 120, c1: 'rgba(20,40,120,0.12)', c2: 'rgba(20,40,120,0)' },
      { x: 400, y: 300, r: 80, c1: 'rgba(120,20,60,0.1)', c2: 'rgba(120,20,60,0)' },
    ];
    nebs.forEach(n => {
      let g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, n.c1); g.addColorStop(1, n.c2);
      ctx.fillStyle = g;
      ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
    });
    // Drifting asteroids
    ctx.fillStyle = 'rgba(60,50,45,0.5)';
    for (let i = 0; i < 8; i++) {
      let ax = (i * 120 + time * 5 * (i % 2 === 0 ? 1 : -1)) % (canvas.width + 40) - 20;
      let ay = 50 + i * 45 + Math.sin(time * 0.5 + i) * 15;
      let ar = 4 + (i % 3) * 3;
      ctx.beginPath(); ctx.arc(ax, ay, ar, 0, Math.PI * 2); ctx.fill();
    }
    // Faint grid lines (perspective)
    ctx.strokeStyle = 'rgba(80,40,120,0.08)';
    ctx.lineWidth = 1;
    for (let gx = 0; gx < canvas.width; gx += 60) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, GROUND); ctx.stroke();
    }
    for (let gy = 0; gy < GROUND; gy += 60) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
    }
    // Twinkling distant stars
    for (let i = 0; i < 40; i++) {
      let sx = (i * 23.7) % canvas.width;
      let sy = (i * 11.3) % (GROUND - 20);
      let sa = 0.2 + Math.sin(time * 2 + i * 4) * 0.2;
      ctx.globalAlpha = sa;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(sx, sy, 0.8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (type === 'heaven') {
    // Heaven's Gate - bright clouds, golden beams, floating arches
    // Layered bright clouds
    ctx.fillStyle = 'rgba(255,255,240,0.15)';
    for (let i = 0; i < 8; i++) {
      let cx = (i * 130 + Math.sin(time * 0.3 + i) * 30) % (canvas.width + 100) - 50;
      let cy = 40 + i * 35 + Math.sin(i * 2.5) * 20;
      let cw = 80 + (i % 3) * 40;
      ctx.beginPath();
      ctx.arc(cx, cy, cw * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + cw * 0.25, cy - 8, cw * 0.25, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - cw * 0.2, cy + 5, cw * 0.2, 0, Math.PI * 2); ctx.fill();
    }
    // Golden light beams from above
    ctx.globalAlpha = 0.08 + Math.sin(time) * 0.03;
    ctx.fillStyle = '#ffdd66';
    [100, 300, 500, 700].forEach((bx, i) => {
      ctx.beginPath();
      ctx.moveTo(bx - 5, 0); ctx.lineTo(bx + 5, 0);
      ctx.lineTo(bx + 40 + i * 5, GROUND); ctx.lineTo(bx - 40 - i * 5, GROUND);
      ctx.closePath(); ctx.fill();
    });
    ctx.globalAlpha = 1;
    // Floating stone arches
    ctx.strokeStyle = 'rgba(180,160,120,0.3)';
    ctx.lineWidth = 6;
    [{ x: 180, y: GROUND - 200 }, { x: 650, y: GROUND - 180 }].forEach(a => {
      ctx.beginPath();
      ctx.arc(a.x, a.y + 30, 40, Math.PI, 0);
      ctx.stroke();
      // Pillars
      ctx.fillStyle = 'rgba(160,140,100,0.25)';
      ctx.fillRect(a.x - 42, a.y + 30, 8, 60);
      ctx.fillRect(a.x + 34, a.y + 30, 8, 60);
    });
    // Halo rings
    ctx.strokeStyle = 'rgba(255,220,100,0.2)';
    ctx.lineWidth = 2;
    [{ x: 420, y: 100, r: 25 }, { x: 250, y: 60, r: 18 }, { x: 700, y: 80, r: 22 }].forEach(h => {
      ctx.beginPath();
      ctx.ellipse(h.x, h.y, h.r, h.r * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
    });

  } else if (type === 'chaos') {
    // Chaos Realm - lightning, reality cracks, pulsing red sky
    // Reality cracks (glowing tears in space)
    ctx.strokeStyle = 'rgba(255,100,255,0.5)';
    ctx.lineWidth = 2;
    let cracks = [
      [{ x: 100, y: 50 }, { x: 120, y: 100 }, { x: 105, y: 160 }],
      [{ x: 500, y: 30 }, { x: 520, y: 80 }, { x: 490, y: 140 }, { x: 510, y: 200 }],
      [{ x: 750, y: 80 }, { x: 770, y: 130 }, { x: 740, y: 190 }],
    ];
    cracks.forEach(crack => {
      ctx.beginPath();
      ctx.moveTo(crack[0].x, crack[0].y);
      for (let i = 1; i < crack.length; i++) {
        ctx.lineTo(crack[i].x + Math.sin(time * 3 + i) * 5, crack[i].y);
      }
      ctx.stroke();
      // Glow around cracks
      ctx.globalAlpha = 0.1;
      ctx.strokeStyle = 'rgba(255,150,255,0.3)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(crack[0].x, crack[0].y);
      for (let i = 1; i < crack.length; i++) {
        ctx.lineTo(crack[i].x + Math.sin(time * 3 + i) * 5, crack[i].y);
      }
      ctx.stroke();
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(255,100,255,0.5)';
      ctx.globalAlpha = 1;
    });
    // Lightning bolts (random jagged lines)
    if (Math.sin(time * 7) > 0.85) {
      ctx.strokeStyle = 'rgba(255,255,200,0.7)';
      ctx.lineWidth = 2;
      let lx = 100 + Math.floor(Math.sin(time * 13) * 300 + 350);
      ctx.beginPath();
      ctx.moveTo(lx, 0);
      let ly = 0;
      while (ly < GROUND - 30) {
        ly += 20 + Math.random() * 25;
        lx += (Math.random() - 0.5) * 40;
        ctx.lineTo(lx, ly);
      }
      ctx.stroke();
    }
    // Mixed terrain fragments (floating debris)
    ctx.fillStyle = 'rgba(60,20,20,0.4)';
    for (let i = 0; i < 6; i++) {
      let fx = (i * 160 + Math.sin(time * 0.7 + i * 2) * 30);
      let fy = 80 + i * 50 + Math.sin(time + i * 3) * 20;
      let fw = 15 + (i % 3) * 10;
      let fh = 8 + (i % 2) * 6;
      ctx.save();
      ctx.translate(fx + fw / 2, fy + fh / 2);
      ctx.rotate(Math.sin(time * 0.5 + i) * 0.3);
      ctx.fillRect(-fw / 2, -fh / 2, fw, fh);
      ctx.restore();
    }
    // Pulsing red sky glow from below
    ctx.globalAlpha = 0.06 + Math.sin(time * 2) * 0.03;
    let skyGrad = ctx.createLinearGradient(0, GROUND, 0, GROUND - 200);
    skyGrad.addColorStop(0, 'rgba(255,0,0,0.3)');
    skyGrad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, GROUND - 200, canvas.width, 200);
    ctx.globalAlpha = 1;
  }
}

// ─── DRAW PLAYER ───
function drawPlayer(p) {
  if (!p || !p.alive) return;

  let isP1 = (p === player);
  let isPvp = pvpMode;

  // PvP glow aura
  if (isPvp) {
    let glowColor = isP1 ? 'rgba(52,152,219,0.12)' : 'rgba(39,174,96,0.12)';
    ctx.fillStyle = glowColor;
    ctx.beginPath();
    ctx.arc(p.x, p.y + p.h / 2, 30, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trail
  p.trail.forEach((t, i) => {
    let alpha = (i / p.trail.length) * (isPvp ? 0.45 : 0.3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.dashing ? p.dashColor : p.bodyColor;
    ctx.fillRect(t.x - p.w / 2, t.y, p.w, p.h);
  });
  ctx.globalAlpha = 1;

  // Invincibility flash
  if (p.invincible > 0 && Math.floor(p.invincible / 3) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  ctx.save();
  ctx.translate(p.x, p.y);

  let walkCycle = (p.onGround && Math.abs(p.vx) > 0.5) ? Math.sin(Date.now() * 0.012) : 0;
  let bodyColor = p.dashing ? p.dashColor : p.bodyColor;
  let skinColor = p.skinColor;

  // Legs (3D gradient shading)
  let legSpread = walkCycle * 6;
  let legBottom = p.h - 4;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.strokeStyle = makeLimbGradient(ctx, -4, 28, -6 - legSpread, legBottom, p.hatColor);
  ctx.beginPath();
  ctx.moveTo(-4, 28);
  ctx.lineTo(-6 - legSpread, legBottom);
  ctx.stroke();
  ctx.strokeStyle = makeLimbGradient(ctx, 4, 28, 6 + legSpread, legBottom, p.hatColor);
  ctx.beginPath();
  ctx.moveTo(4, 28);
  ctx.lineTo(6 + legSpread, legBottom);
  ctx.stroke();
  // Shoes
  ctx.fillStyle = p.shoeColor;
  ctx.beginPath();
  ctx.ellipse(-6 - legSpread, legBottom, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6 + legSpread, legBottom, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Torso (3D gradient shading — lit from left)
  ctx.fillStyle = make3DGradient(ctx, -11, 14, 22, 14, bodyColor);
  ctx.beginPath();
  ctx.moveTo(-10, 14);
  ctx.lineTo(-11, 28);
  ctx.lineTo(11, 28);
  ctx.lineTo(10, 14);
  ctx.closePath();
  ctx.fill();
  // Torso rim highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, 14);
  ctx.lineTo(-11, 28);
  ctx.stroke();

  // PvP: unique torso markings
  if (isPvp) {
    if (isP1) {
      // P1: star badge
      ctx.fillStyle = '#ffe66d';
      ctx.beginPath();
      ctx.arc(0, 21, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(0, 21, 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // P2: X marking
      ctx.strokeStyle = '#ff9800';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-3, 19); ctx.lineTo(3, 25);
      ctx.moveTo(3, 19); ctx.lineTo(-3, 25);
      ctx.stroke();
    }
  }

  // Belt
  ctx.fillStyle = '#7f8c8d';
  ctx.fillRect(-10, 26, 20, 3);
  ctx.fillStyle = isPvp && isP1 ? '#3498db' : isPvp ? '#f39c12' : '#f1c40f';
  ctx.fillRect(-2, 26, 4, 3);

  // Back arm (3D shaded)
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  let backArmSwing = walkCycle * 4;
  ctx.strokeStyle = makeLimbGradient(ctx, -p.facing * 6, 17, -p.facing * 10, 26 + backArmSwing, skinColor);
  ctx.beginPath();
  ctx.moveTo(-p.facing * 6, 17);
  ctx.lineTo(-p.facing * 10, 26 + backArmSwing);
  ctx.stroke();

  // Gun arm (3D shaded)
  let gunArmY = 18;
  ctx.strokeStyle = makeLimbGradient(ctx, p.facing * 6, 17, p.facing * 13, gunArmY, skinColor);
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(p.facing * 6, 17);
  ctx.lineTo(p.facing * 13, gunArmY);
  ctx.stroke();

  // Gun
  ctx.save();
  ctx.translate(p.facing * 13, gunArmY);
  ctx.fillStyle = '#95a5a6';
  ctx.fillRect(0, -3, p.facing * 16, 5);
  ctx.fillStyle = '#5d4e37';
  ctx.fillRect(0, 2, p.facing * 4, 5);
  ctx.fillStyle = '#bdc3c7';
  ctx.fillRect(p.facing * 14, -2, p.facing * 3, 3);
  ctx.restore();

  // Head (3D radial gradient)
  ctx.fillStyle = makeHeadGradient(ctx, 0, 8, 10, skinColor);
  ctx.beginPath();
  ctx.arc(0, 8, 10, 0, Math.PI * 2);
  ctx.fill();
  // Specular highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(-3, 4, 3, 0, Math.PI * 2);
  ctx.fill();

  // PvP unique headgear
  if (isPvp && isP1) {
    // P1: bandana
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.moveTo(-11, 4); ctx.lineTo(-10, -2); ctx.lineTo(10, -2); ctx.lineTo(11, 4);
    ctx.closePath();
    ctx.fill();
    // Bandana tail
    ctx.strokeStyle = '#2980b9';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-p.facing * 10, 1);
    ctx.quadraticCurveTo(-p.facing * 18, 4 + Math.sin(Date.now() * 0.006) * 2, -p.facing * 16, 10);
    ctx.stroke();
    // Scar
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.facing > 0 ? -2 : 2, 4);
    ctx.lineTo(p.facing > 0 ? -5 : 5, 12);
    ctx.stroke();
  } else if (isPvp && !isP1) {
    // P2: helmet/mask
    ctx.fillStyle = '#1a5c2e';
    ctx.beginPath();
    ctx.arc(0, 6, 11, -Math.PI, 0);
    ctx.fill();
    // Visor
    ctx.fillStyle = '#f39c12';
    ctx.fillRect(-8, 4, 16, 3);
    // Mask lower
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.moveTo(-8, 7);
    ctx.lineTo(-6, 15);
    ctx.lineTo(6, 15);
    ctx.lineTo(8, 7);
    ctx.closePath();
    ctx.fill();
  } else {
    // Default hat (non-PvP)
    ctx.fillStyle = p.hatColor;
    ctx.fillRect(-13, 1, 26, 4);
    ctx.beginPath();
    ctx.moveTo(-9, 4);
    ctx.lineTo(-8, -6);
    ctx.lineTo(8, -6);
    ctx.lineTo(9, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = p.hatBand;
    ctx.fillRect(-9, 0, 18, 3);
  }

  // Face (skip for P2 in PvP - has mask)
  if (!(isPvp && !isP1)) {
    ctx.fillStyle = '#fff';
    let eyeX = p.facing > 0 ? 3 : -6;
    ctx.beginPath();
    ctx.ellipse(eyeX, 7, 3, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(eyeX + p.facing * 1, 7, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.facing * 3, 12, 3, 0.1, Math.PI * 0.8);
    ctx.stroke();
  }

  // Shield (enhanced energy dome)
  if (p.shielding) {
    let sTime = Date.now() * 0.001;
    let shieldR = p.w * 0.95;
    let shieldCY = p.h / 2;
    let shieldColor = isPvp ? (isP1 ? '#3498db' : '#27ae60') : '#66bbff';
    let shieldRgb = hexToRgb(shieldColor);

    // Outer glow fill
    let shieldGrad = ctx.createRadialGradient(0, shieldCY, shieldR * 0.5, 0, shieldCY, shieldR);
    shieldGrad.addColorStop(0, `rgba(${shieldRgb[0]},${shieldRgb[1]},${shieldRgb[2]},0)`);
    shieldGrad.addColorStop(0.7, `rgba(${shieldRgb[0]},${shieldRgb[1]},${shieldRgb[2]},0.06)`);
    shieldGrad.addColorStop(1, `rgba(${shieldRgb[0]},${shieldRgb[1]},${shieldRgb[2]},0.15)`);
    ctx.fillStyle = shieldGrad;
    ctx.beginPath();
    ctx.arc(0, shieldCY, shieldR, 0, Math.PI * 2);
    ctx.fill();

    // Hex grid pattern on dome
    ctx.globalAlpha = 0.12 + Math.sin(sTime * 3) * 0.04;
    ctx.strokeStyle = shieldColor;
    ctx.lineWidth = 0.5;
    for (let hx = -shieldR; hx < shieldR; hx += 10) {
      for (let hy = shieldCY - shieldR; hy < shieldCY + shieldR; hy += 9) {
        let dx = hx, dy = hy - shieldCY;
        if (dx * dx + dy * dy < shieldR * shieldR * 0.85) {
          let offset = (Math.floor((hy - shieldCY + shieldR) / 9) % 2) * 5;
          ctx.beginPath();
          ctx.arc(hx + offset, hy, 4, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    // Rotating energy arcs
    ctx.globalAlpha = 0.35 + Math.sin(sTime * 4) * 0.1;
    ctx.strokeStyle = shieldColor;
    ctx.lineWidth = 2;
    ctx.shadowColor = shieldColor;
    ctx.shadowBlur = 12;
    for (let a = 0; a < 3; a++) {
      let arcStart = sTime * 2 + a * Math.PI * 2 / 3;
      ctx.beginPath();
      ctx.arc(0, shieldCY, shieldR, arcStart, arcStart + 0.8);
      ctx.stroke();
    }

    // Main outer ring
    ctx.globalAlpha = 0.3 + Math.sin(sTime * 5) * 0.08;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, shieldCY, shieldR, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.globalAlpha = 0.15;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, shieldCY, shieldR * 0.7, 0, Math.PI * 2);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Shield broken flash
  if (p.shieldBroken && p.shieldBrokenTimer > 0) {
    let flash = Math.sin(Date.now() * 0.02) * 0.2 + 0.15;
    ctx.globalAlpha = flash;
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 10;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(0, p.h / 2, p.w * 0.95, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Health bar
  let hpRatio = p.health / p.maxHealth;
  let hpBarW = isPvp ? 36 : p.w;
  ctx.fillStyle = 'rgba(50,50,50,0.6)';
  ctx.fillRect(-hpBarW / 2, p.h + 4, hpBarW, isPvp ? 5 : 4);
  ctx.fillStyle = hpRatio > 0.5 ? '#2ecc71' : hpRatio > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(-hpBarW / 2, p.h + 4, hpBarW * hpRatio, isPvp ? 5 : 4);
  if (isPvp) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(-hpBarW / 2, p.h + 4, hpBarW, 5);
  }

  // PvP: player label
  if (isPvp) {
    ctx.fillStyle = isP1 ? '#3498db' : '#27ae60';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(isP1 ? 'P1' : 'P2', 0, -6);
  }

  // Reload indicator
  if (p.reloading) {
    ctx.fillStyle = 'rgba(243,156,18,0.3)';
    ctx.fillRect(-p.w / 2, p.h + (isPvp ? 11 : 10), p.w * (1 - p.reloadTimer / 50), 3);
  } else {
    let ammoRatio = p.ammo / p.maxAmmo;
    ctx.fillStyle = ammoRatio > 0.3 ? '#ffe66d' : '#e74c3c';
    ctx.fillRect(-p.w / 2, p.h + (isPvp ? 11 : 10), p.w * ammoRatio, 3);
  }

  // Shield energy bar
  let shieldRatio = p.shieldEnergy / p.maxShieldEnergy;
  ctx.fillStyle = 'rgba(50,50,80,0.5)';
  ctx.fillRect(-p.w / 2, p.h + (isPvp ? 16 : 15), p.w, 3);
  ctx.fillStyle = p.shieldBroken ? '#ff4444' : (shieldRatio > 0.3 ? '#66bbff' : '#ff6666');
  ctx.fillRect(-p.w / 2, p.h + (isPvp ? 16 : 15), p.w * shieldRatio, 3);

  ctx.restore();
  ctx.globalAlpha = 1;
}

// ─── DRAW ───
function draw() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  }

  // Level theme
  let lvl = getCurrentLevel();

  // Sky gradient
  let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, lvl.sky[0]);
  grad.addColorStop(0.6, lvl.sky[1]);
  grad.addColorStop(1, lvl.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  let time = Date.now() * 0.002;
  stars.forEach(s => {
    let alpha = 0.3 + Math.sin(time + s.twinkle) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  // ─── 2.5D: FAR PARALLAX LAYER ───
  let pTime = Date.now() * 0.001;
  let farOffset = pTime * 0.5;
  ctx.globalAlpha = 0.5;
  // Far layer: distant mountain/skyline silhouettes
  let farRgb = hexToRgb(lvl.sky[2]);
  ctx.fillStyle = rgbStr(lighten(farRgb, 15));
  for (let i = 0; i < 2; i++) {
    let ox = ((i * 900) - (farOffset * 20) % 900 + 900) % 1800 - 450;
    ctx.beginPath();
    ctx.moveTo(ox, GROUND);
    for (let mx = 0; mx <= 900; mx += 40) {
      let mh = 70 + Math.sin(mx * 0.007 + i * 2) * 50 + Math.cos(mx * 0.013 + i) * 30;
      ctx.lineTo(ox + mx, GROUND - mh);
    }
    ctx.lineTo(ox + 900, GROUND);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Backdrop (mid parallax layer)
  drawBackdrop(lvl.backdrop);

  // ─── 2.5D: DEPTH FOG GRADIENT (Phase 5) ───
  if (lvl.fogColor) {
    let fc = lvl.fogColor;
    let fogGrad = ctx.createLinearGradient(0, 0, 0, GROUND);
    fogGrad.addColorStop(0, `rgba(${fc[0]},${fc[1]},${fc[2]},0)`);
    fogGrad.addColorStop(0.6, `rgba(${fc[0]},${fc[1]},${fc[2]},0.06)`);
    fogGrad.addColorStop(1, `rgba(${fc[0]},${fc[1]},${fc[2]},0.15)`);
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, 0, canvas.width, GROUND);
  }

  // ─── 2.5D: NEAR PARALLAX LAYER ───
  let nearOffset = pTime * 2.0;
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = lvl.ground[0];
  for (let i = 0; i < 15; i++) {
    let fx = ((i * 70 - (nearOffset * 30) % 1050) + 1050) % 1050 - 60;
    let fh = 8 + (i * 7 % 16);
    let fw = 14 + (i * 5 % 12);
    ctx.fillRect(fx, GROUND - fh, fw, fh);
  }
  ctx.globalAlpha = 1;

  // ─── 2.5D: GOD RAYS (Phase 5 — select levels) ───
  if (lvl.backdrop === 'skyfortress' || lvl.backdrop === 'omega' || lvl.backdrop === 'skyline') {
    let savedOp = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = 'lighter';
    let rayColor = lvl.backdrop === 'omega' ? 'rgba(255,60,20,' : lvl.backdrop === 'skyfortress' ? 'rgba(150,100,255,' : 'rgba(60,160,255,';
    for (let r = 0; r < 4; r++) {
      let rx = 120 + r * 200 + Math.sin(pTime * 0.3 + r * 1.5) * 40;
      let rw = 30 + r * 10;
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = rayColor + '0.6)';
      ctx.beginPath();
      ctx.moveTo(rx, 0);
      ctx.lineTo(rx + rw, 0);
      ctx.lineTo(rx + rw + 60, GROUND);
      ctx.lineTo(rx - 40, GROUND);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = savedOp;
  }

  // ─── 2.5D: DUST MOTES (Phase 5) ───
  let dustColor = lvl.fogColor ? `rgba(${Math.min(255,lvl.fogColor[0]+100)},${Math.min(255,lvl.fogColor[1]+100)},${Math.min(255,lvl.fogColor[2]+100)},` : 'rgba(200,200,200,';
  dustMotes.forEach(d => {
    d.x += d.speedX;
    d.y += d.speedY + Math.sin(pTime * 2 + d.phase) * 0.05;
    if (d.x > 910) d.x = -10;
    if (d.y > 450) d.y = -10;
    if (d.y < -10) d.y = 450;
    ctx.fillStyle = dustColor + d.alpha + ')';
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ground (Phase 7: with depth enhancements)
  let groundGrad = ctx.createLinearGradient(0, GROUND, 0, canvas.height);
  groundGrad.addColorStop(0, lvl.ground[0]);
  groundGrad.addColorStop(0.3, lvl.ground[1]);
  groundGrad.addColorStop(1, lvl.ground[2]);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND, canvas.width, canvas.height - GROUND);
  // Ground surface line with glow
  ctx.shadowColor = lvl.groundGlow;
  ctx.shadowBlur = 6;
  ctx.strokeStyle = lvl.groundLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(canvas.width, GROUND);
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Perspective grid lines (Phase 7)
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  let gridSpacing = 4;
  for (let gi = 0; gi < 8; gi++) {
    ctx.beginPath();
    ctx.moveTo(0, GROUND + gridSpacing);
    ctx.lineTo(canvas.width, GROUND + gridSpacing);
    ctx.stroke();
    gridSpacing += 3 + gi * 1.5;
  }
  // Ground surface shine (Phase 7)
  let shineGrad = ctx.createRadialGradient(canvas.width / 2, GROUND + 2, 5, canvas.width / 2, GROUND + 2, 250);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.1)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.fillRect(canvas.width / 2 - 200, GROUND, 400, 20);
  // Ground texture - small dashes
  ctx.globalAlpha = 0.2;
  ctx.strokeStyle = lvl.groundLine;
  ctx.lineWidth = 1;
  for (let gx = 0; gx < canvas.width; gx += 18) {
    let gy = GROUND + 8 + (gx * 7 % 13);
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 6 + (gx % 5), gy);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // Ground edge highlight dots
  for (let gx = 0; gx < canvas.width; gx += 40) {
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = lvl.groundLine;
    ctx.beginPath();
    ctx.arc(gx + 20, GROUND + 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ─── 2.5D: 3D PLATFORMS (Phase 3) ───
  let theme = platformThemes[lvl.platformTheme] || platformThemes.concrete;
  platforms.forEach(p => {
    let thickness = 12;
    // Shadow below platform
    let shadowGrad = ctx.createLinearGradient(p.x, p.y + p.h, p.x, p.y + p.h + 16);
    shadowGrad.addColorStop(0, 'rgba(0,0,0,0.3)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadowGrad;
    ctx.fillRect(p.x + 3, p.y + p.h, p.w, 16);
    // Front face (3D thickness)
    ctx.fillStyle = theme.front;
    ctx.fillRect(p.x, p.y + p.h, p.w, thickness);
    // Right edge (parallelogram for 3D)
    ctx.fillStyle = theme.side;
    ctx.beginPath();
    ctx.moveTo(p.x + p.w, p.y);
    ctx.lineTo(p.x + p.w + 6, p.y - 5);
    ctx.lineTo(p.x + p.w + 6, p.y + p.h + thickness - 5);
    ctx.lineTo(p.x + p.w, p.y + p.h + thickness);
    ctx.closePath();
    ctx.fill();
    // Top face (lit surface — isometric top)
    ctx.fillStyle = theme.top;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + 6, p.y - 5);
    ctx.lineTo(p.x + p.w + 6, p.y - 5);
    ctx.lineTo(p.x + p.w, p.y);
    ctx.closePath();
    ctx.fill();
    // Top flat surface
    let platGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    platGrad.addColorStop(0, theme.top);
    platGrad.addColorStop(1, theme.front);
    ctx.fillStyle = platGrad;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // Top surface glow line
    ctx.shadowColor = theme.glow;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = theme.line;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x + 2, p.y);
    ctx.lineTo(p.x + p.w - 2, p.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // ─── 2.5D: ENTITY SHADOWS (Phase 1) ───
  // Player shadows
  if (state === 'playing') {
    if (player.alive) {
      let pSurf = findShadowSurface(player.x, player.y, player.h);
      drawShadow(player.x, player.y, player.w, pSurf);
    }
    if (player2 && player2.alive) {
      let p2Surf = findShadowSurface(player2.x, player2.y, player2.h);
      drawShadow(player2.x, player2.y, player2.w, p2Surf);
    }
  }
  // Enemy shadows
  enemies.forEach(e => {
    if (!e.alive || e.dying) return;
    if (e.type === 'drone' || e.type === 'gunship') {
      drawShadow(e.x, e.y, e.w * 0.8, GROUND);
    } else {
      let eSurf = findShadowSurface(e.x, e.y, e.h);
      drawShadow(e.x, e.y, e.w, eSurf);
    }
  });
  // Grenade shadows
  grenades.forEach(g => {
    drawShadow(g.x, g.y, 6, GROUND);
  });

  // Casings
  ctx.fillStyle = '#b8860b';
  casings.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillRect(-3, -1, 6, 2);
    ctx.restore();
  });

  // Particles (enhanced with glow/smoke types — Phase 6)
  // Regular and fire particles
  particles.forEach(p => {
    let alpha = p.life / p.maxLife;
    if (p.ring) {
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      let r = p.size * (1 - alpha) * 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
    } else if (p.glow) {
      let savedOp = ctx.globalCompositeOperation;
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = alpha * 0.8;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = p.size * 2;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = savedOp;
    } else {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
  });
  ctx.globalAlpha = 1;
  // Smoke particles (grow over time)
  smokeParticles.forEach((sp, i) => {
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.life--;
    sp.size += 0.12;
    sp.vx *= 0.98;
    sp.vy *= 0.98;
    let alpha = (sp.life / sp.maxLife) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI * 2);
    ctx.fill();
  });
  // Clean up dead smoke
  for (let i = smokeParticles.length - 1; i >= 0; i--) {
    if (smokeParticles[i].life <= 0) smokeParticles.splice(i, 1);
  }
  ctx.globalAlpha = 1;

  // Bullets (enhanced trails — Phase 6)
  bullets.forEach(b => {
    // Trail with additive glow
    let savedOp = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = 'lighter';
    b.trail.forEach((t, i) => {
      let alpha = (i / b.trail.length) * 0.35;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = b.explosive ? '#ff8a50' : b.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, b.size * (b.explosive ? 0.8 : 0.6), 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalCompositeOperation = savedOp;
    ctx.globalAlpha = 1;
    if (b.explosive) {
      // RPG rocket rendering
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      // Rocket body
      ctx.fillStyle = '#888';
      ctx.fillRect(-8, -3, 16, 6);
      // Warhead
      ctx.fillStyle = '#ff5252';
      ctx.beginPath();
      ctx.moveTo(8, -3);
      ctx.lineTo(12, 0);
      ctx.lineTo(8, 3);
      ctx.closePath();
      ctx.fill();
      // Fins
      ctx.fillStyle = '#666';
      ctx.fillRect(-8, -5, 4, 2);
      ctx.fillRect(-8, 3, 4, 2);
      // Exhaust glow
      ctx.shadowColor = '#ff8a00';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(-10, 0, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      // Normal bullet glow
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Grenades
  grenades.forEach(g => {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.rotation);
    // Body
    ctx.fillStyle = '#4a6a20';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    // Top cap
    ctx.fillStyle = '#333';
    ctx.fillRect(-2, -7, 4, 3);
    ctx.restore();
    // Blinking warning glow when fuse < 30
    if (g.fuse < 30) {
      let blink = Math.sin(Date.now() * 0.02) > 0;
      if (blink) {
        ctx.globalAlpha = 0.5;
        ctx.shadowColor = '#ff4400';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff4400';
        ctx.beginPath();
        ctx.arc(g.x, g.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }
  });

  // Powerups
  powerups.forEach(p => {
    let bob = Math.sin(Date.now() * 0.005) * 3;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.w / 2, p.y - p.h / 2 + bob, p.w, p.h);
    ctx.shadowBlur = 0;
    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    let icon = p.type === 'health' ? '+' : p.type === 'slowmo' ? 'S' : p.type === 'grenade' ? 'G' : p.type[0].toUpperCase();
    ctx.fillText(icon, p.x, p.y + 4 + bob);
  });

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    let shake = e.hit > 0 ? (Math.random() - 0.5) * 4 : 0;
    let eColor = e.hit > 0 ? '#fff' : e.color;
    let eSkin = e.hit > 0 ? '#fff' : '#cba984';
    let eWalk = Math.sin(Date.now() * 0.01 + e.x) * 5;

    ctx.save();
    if (e.dying) {
      let alpha = Math.max(0, e.deathTimer / 45);
      ctx.globalAlpha = alpha;
      ctx.translate(e.x, e.y + e.h / 2);
      ctx.rotate(e.deathRotation);
      ctx.translate(0, -e.h / 2);
      eColor = e.color;
      eSkin = '#cba984';
    } else {
      ctx.translate(e.x + shake, e.y);
    }

    if (e.boss) {
      // ── BOSS RENDERING ──
      let bossTime = Date.now() * 0.003;

      // Pulsing aura
      let auraPulse = 0.15 + Math.sin(bossTime) * 0.1;
      ctx.globalAlpha = auraPulse;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 30;
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(0, e.h * 0.4, e.w * 0.9, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;

      // Legs (thicker)
      let eLegBottom = e.h - 3;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#222';
      ctx.beginPath();
      ctx.moveTo(-6, e.h * 0.62);
      ctx.lineTo(-8 - eWalk, eLegBottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(6, e.h * 0.62);
      ctx.lineTo(8 + eWalk, eLegBottom);
      ctx.stroke();
      // Heavy boots
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.ellipse(-8 - eWalk, eLegBottom, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(8 + eWalk, eLegBottom, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Torso (wider, 3D gradient)
      let tw = e.w * 0.85;
      ctx.fillStyle = (e.hit > 0) ? '#fff' : make3DGradient(ctx, -tw / 2 - 3, e.h * 0.24, tw + 6, e.h * 0.38, e.color);
      ctx.beginPath();
      ctx.moveTo(-tw / 2, e.h * 0.24);
      ctx.lineTo(-tw / 2 - 3, e.h * 0.62);
      ctx.lineTo(tw / 2 + 3, e.h * 0.62);
      ctx.lineTo(tw / 2, e.h * 0.24);
      ctx.closePath();
      ctx.fill();
      // Rim light
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-tw / 2, e.h * 0.24);
      ctx.lineTo(-tw / 2 - 3, e.h * 0.62);
      ctx.stroke();
      // Chest armor detail
      ctx.strokeStyle = 'rgba(255,100,100,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8, e.h * 0.32);
      ctx.lineTo(0, e.h * 0.42);
      ctx.lineTo(8, e.h * 0.32);
      ctx.stroke();

      // Arms (thicker)
      ctx.strokeStyle = eSkin;
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-e.facing * 8, e.h * 0.3);
      ctx.lineTo(-e.facing * 14, e.h * 0.5 + eWalk * 0.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.facing * 8, e.h * 0.3);
      ctx.lineTo(e.facing * 16, e.h * 0.36);
      ctx.stroke();

      // Big gun
      ctx.fillStyle = '#555';
      ctx.fillRect(e.facing * 16, e.h * 0.33 - 3, e.facing * 18, 5);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(e.facing * 16, e.h * 0.33 - 4, e.facing * 3, 7);

      // Head (larger, 3D gradient)
      let headR = e.w * 0.34;
      ctx.fillStyle = (e.hit > 0) ? '#fff' : makeHeadGradient(ctx, 0, e.h * 0.16, headR, eSkin);
      ctx.beginPath();
      ctx.arc(0, e.h * 0.16, headR, 0, Math.PI * 2);
      ctx.fill();

      // Crown/Horns
      ctx.fillStyle = '#cc0000';
      // Left horn
      ctx.beginPath();
      ctx.moveTo(-headR + 2, e.h * 0.1);
      ctx.lineTo(-headR - 4, e.h * 0.16 - headR - 14);
      ctx.lineTo(-headR + 8, e.h * 0.06);
      ctx.closePath();
      ctx.fill();
      // Right horn
      ctx.beginPath();
      ctx.moveTo(headR - 2, e.h * 0.1);
      ctx.lineTo(headR + 4, e.h * 0.16 - headR - 14);
      ctx.lineTo(headR - 8, e.h * 0.06);
      ctx.closePath();
      ctx.fill();
      // Center spike
      ctx.beginPath();
      ctx.moveTo(-4, e.h * 0.05);
      ctx.lineTo(0, e.h * 0.16 - headR - 10);
      ctx.lineTo(4, e.h * 0.05);
      ctx.closePath();
      ctx.fill();

      // Glowing red eyes
      let eyeGlow = 0.7 + Math.sin(bossTime * 2) * 0.3;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 12;
      ctx.fillStyle = `rgba(255,0,0,${eyeGlow})`;
      let eeXL = -5;
      let eeXR = 5;
      let eeY = e.h * 0.15;
      ctx.beginPath();
      ctx.ellipse(eeXL, eeY, 3, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(eeXR, eeY, 3, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eye glint
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(eeXL + e.facing, eeY - 1, 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eeXR + e.facing, eeY - 1, 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Angry brow
      ctx.strokeStyle = '#660000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(eeXL - 4, eeY - 5);
      ctx.lineTo(eeXL + 4, eeY - 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(eeXR + 4, eeY - 5);
      ctx.lineTo(eeXR - 4, eeY - 3);
      ctx.stroke();

      // Big health bar
      let hbW = 60;
      let hbH = 7;
      ctx.fillStyle = '#333';
      ctx.fillRect(-hbW / 2, -18, hbW, hbH);
      let hpRatio = e.health / e.maxHealth;
      let hpColor = hpRatio > 0.5 ? '#ff0000' : hpRatio > 0.25 ? '#ff6600' : '#ff0000';
      ctx.fillStyle = hpColor;
      ctx.fillRect(-hbW / 2, -18, hbW * hpRatio, hbH);
      ctx.strokeStyle = '#aa0000';
      ctx.lineWidth = 1;
      ctx.strokeRect(-hbW / 2, -18, hbW, hbH);
      // "BOSS" label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', 0, -21);

    } else if (e.mega) {
      // ── MEGABOSS RENDERING ──
      let megaTime = Date.now() * 0.003;

      // Pulsing aura (larger)
      let auraPulse = 0.2 + Math.sin(megaTime) * 0.12;
      ctx.globalAlpha = auraPulse;
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#ff1744';
      ctx.beginPath();
      ctx.arc(0, e.h * 0.4, e.w * 1.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;

      // Wings
      ctx.fillStyle = 'rgba(255,23,68,0.3)';
      let wingFlap = Math.sin(megaTime * 2) * 5;
      // Left wing
      ctx.beginPath();
      ctx.moveTo(-e.w * 0.4, e.h * 0.3);
      ctx.lineTo(-e.w * 0.9, e.h * 0.1 + wingFlap);
      ctx.lineTo(-e.w * 0.7, e.h * 0.5);
      ctx.closePath();
      ctx.fill();
      // Right wing
      ctx.beginPath();
      ctx.moveTo(e.w * 0.4, e.h * 0.3);
      ctx.lineTo(e.w * 0.9, e.h * 0.1 + wingFlap);
      ctx.lineTo(e.w * 0.7, e.h * 0.5);
      ctx.closePath();
      ctx.fill();

      // Legs (thick)
      let eLegBottom = e.h - 3;
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#222';
      ctx.beginPath();
      ctx.moveTo(-8, e.h * 0.62);
      ctx.lineTo(-10 - eWalk, eLegBottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(8, e.h * 0.62);
      ctx.lineTo(10 + eWalk, eLegBottom);
      ctx.stroke();
      // Heavy boots
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.ellipse(-10 - eWalk, eLegBottom, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(10 + eWalk, eLegBottom, 7, 5, 0, 0, Math.PI * 2); ctx.fill();

      // Torso (3D gradient)
      let tw = e.w * 0.9;
      ctx.fillStyle = (e.hit > 0) ? '#fff' : make3DGradient(ctx, -tw / 2 - 4, e.h * 0.22, tw + 8, e.h * 0.4, e.color);
      ctx.beginPath();
      ctx.moveTo(-tw / 2, e.h * 0.22);
      ctx.lineTo(-tw / 2 - 4, e.h * 0.62);
      ctx.lineTo(tw / 2 + 4, e.h * 0.62);
      ctx.lineTo(tw / 2, e.h * 0.22);
      ctx.closePath();
      ctx.fill();
      // Rim light
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-tw / 2, e.h * 0.22);
      ctx.lineTo(-tw / 2 - 4, e.h * 0.62);
      ctx.stroke();

      // Arms + Big gun
      ctx.strokeStyle = eSkin;
      ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(-e.facing * 10, e.h * 0.3); ctx.lineTo(-e.facing * 16, e.h * 0.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(e.facing * 10, e.h * 0.3); ctx.lineTo(e.facing * 18, e.h * 0.36); ctx.stroke();
      ctx.fillStyle = '#555';
      ctx.fillRect(e.facing * 18, e.h * 0.33 - 4, e.facing * 22, 7);
      ctx.fillStyle = '#ff1744';
      ctx.fillRect(e.facing * 18, e.h * 0.33 - 5, e.facing * 4, 9);

      // Head (3D gradient)
      let headR = e.w * 0.36;
      ctx.fillStyle = (e.hit > 0) ? '#fff' : makeHeadGradient(ctx, 0, e.h * 0.14, headR, eSkin);
      ctx.beginPath(); ctx.arc(0, e.h * 0.14, headR, 0, Math.PI * 2); ctx.fill();

      // Crown/Horns (larger)
      ctx.fillStyle = '#cc0000';
      ctx.beginPath(); ctx.moveTo(-headR + 2, e.h * 0.08); ctx.lineTo(-headR - 6, e.h * 0.14 - headR - 18); ctx.lineTo(-headR + 10, e.h * 0.04); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(headR - 2, e.h * 0.08); ctx.lineTo(headR + 6, e.h * 0.14 - headR - 18); ctx.lineTo(headR - 10, e.h * 0.04); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-5, e.h * 0.03); ctx.lineTo(0, e.h * 0.14 - headR - 14); ctx.lineTo(5, e.h * 0.03); ctx.closePath(); ctx.fill();

      // Glowing eyes
      let eyeGlow = 0.8 + Math.sin(megaTime * 3) * 0.2;
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 15;
      ctx.fillStyle = `rgba(255,23,68,${eyeGlow})`;
      ctx.beginPath(); ctx.ellipse(-6, e.h * 0.13, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, e.h * 0.13, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;

      // Large health bar
      let hbW = 80;
      let hbH = 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(-hbW / 2, -22, hbW, hbH);
      let hpRatio = e.health / e.maxHealth;
      ctx.fillStyle = hpRatio > 0.5 ? '#ff1744' : hpRatio > 0.25 ? '#ff6600' : '#ff0000';
      ctx.fillRect(-hbW / 2, -22, hbW * hpRatio, hbH);
      ctx.strokeStyle = '#aa0000';
      ctx.lineWidth = 1;
      ctx.strokeRect(-hbW / 2, -22, hbW, hbH);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('MEGA BOSS', 0, -25);

    } else if (e.type === 'drone') {
      // ── DRONE RENDERING ──
      let droneTime = Date.now() * 0.01;
      // Body circle
      ctx.fillStyle = eColor;
      ctx.beginPath();
      ctx.arc(0, e.h / 2, e.w * 0.45, 0, Math.PI * 2);
      ctx.fill();
      // Spinning rotors
      let rotorAngle = droneTime * 3;
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      for (let r = 0; r < 4; r++) {
        let ra = rotorAngle + r * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(0, e.h / 2 - e.w * 0.35);
        ctx.lineTo(Math.cos(ra) * e.w * 0.5, e.h / 2 - e.w * 0.35 + Math.sin(ra) * 3);
        ctx.stroke();
      }
      // Sensor eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(e.facing * 3, e.h / 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(e.facing * 4, e.h / 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Gun
      ctx.fillStyle = '#666';
      ctx.fillRect(e.facing * 6, e.h / 2 + 2, e.facing * 8, 2);
      // Health bar
      if (e.health < e.maxHealth) {
        ctx.fillStyle = '#333';
        ctx.fillRect(-e.w / 2, -6, e.w, 3);
        ctx.fillStyle = e.color;
        ctx.fillRect(-e.w / 2, -6, e.w * (e.health / e.maxHealth), 3);
      }

    } else if (e.type === 'gunship') {
      // ── GUNSHIP RENDERING ──
      let gsTime = Date.now() * 0.008;
      // Elongated body
      ctx.fillStyle = eColor;
      ctx.beginPath();
      ctx.ellipse(0, e.h / 2, e.w * 0.48, e.h * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      // Cockpit
      ctx.fillStyle = 'rgba(200,200,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(e.facing * e.w * 0.2, e.h * 0.35, 6, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Twin rotors
      let rotorAngle = gsTime * 4;
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 2;
      [-1, 1].forEach(side => {
        let rx = side * e.w * 0.35;
        let ry = e.h * 0.25;
        for (let r = 0; r < 3; r++) {
          let ra = rotorAngle + r * Math.PI * 2 / 3;
          ctx.beginPath();
          ctx.moveTo(rx, ry);
          ctx.lineTo(rx + Math.cos(ra) * 12, ry + Math.sin(ra) * 3);
          ctx.stroke();
        }
      });
      // Twin guns
      ctx.fillStyle = '#555';
      ctx.fillRect(e.facing * 8, e.h * 0.55, e.facing * 14, 3);
      ctx.fillRect(e.facing * 8, e.h * 0.65, e.facing * 14, 3);
      // Health bar
      let hbW2 = 44;
      ctx.fillStyle = '#333';
      ctx.fillRect(-hbW2 / 2, -10, hbW2, 5);
      let hpR2 = e.health / e.maxHealth;
      ctx.fillStyle = hpR2 > 0.5 ? e.color : '#ff6600';
      ctx.fillRect(-hbW2 / 2, -10, hbW2 * hpR2, 5);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(-hbW2 / 2, -10, hbW2, 5);

    } else {
      // ── NORMAL ENEMY RENDERING (3D shaded) ──

      // ── Legs (gradient) ──
      let eLegBottom = e.h - 3;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.strokeStyle = makeLimbGradient(ctx, -3, e.h * 0.62, -5 - eWalk, eLegBottom, '#333');
      ctx.beginPath();
      ctx.moveTo(-3, e.h * 0.62);
      ctx.lineTo(-5 - eWalk, eLegBottom);
      ctx.stroke();
      ctx.strokeStyle = makeLimbGradient(ctx, 3, e.h * 0.62, 5 + eWalk, eLegBottom, '#333');
      ctx.beginPath();
      ctx.moveTo(3, e.h * 0.62);
      ctx.lineTo(5 + eWalk, eLegBottom);
      ctx.stroke();
      // Shoes
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.ellipse(-5 - eWalk, eLegBottom, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(5 + eWalk, eLegBottom, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // ── Torso (3D gradient) ──
      let tw = e.w * 0.8;
      ctx.fillStyle = (e.hit > 0) ? '#fff' : make3DGradient(ctx, -tw / 2 - 1, e.h * 0.28, tw + 2, e.h * 0.34, e.color);
      ctx.beginPath();
      ctx.moveTo(-tw / 2, e.h * 0.28);
      ctx.lineTo(-tw / 2 - 1, e.h * 0.62);
      ctx.lineTo(tw / 2 + 1, e.h * 0.62);
      ctx.lineTo(tw / 2, e.h * 0.28);
      ctx.closePath();
      ctx.fill();
      // Rim light
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-tw / 2, e.h * 0.28);
      ctx.lineTo(-tw / 2 - 1, e.h * 0.62);
      ctx.stroke();

      // ── Arms (3D shaded) ──
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      // Back arm
      ctx.strokeStyle = makeLimbGradient(ctx, -e.facing * 5, e.h * 0.32, -e.facing * 9, e.h * 0.5 + eWalk * 0.5, eSkin);
      ctx.beginPath();
      ctx.moveTo(-e.facing * 5, e.h * 0.32);
      ctx.lineTo(-e.facing * 9, e.h * 0.5 + eWalk * 0.5);
      ctx.stroke();
      // Gun arm
      ctx.strokeStyle = makeLimbGradient(ctx, e.facing * 5, e.h * 0.32, e.facing * 11, e.h * 0.38, eSkin);
      ctx.beginPath();
      ctx.moveTo(e.facing * 5, e.h * 0.32);
      ctx.lineTo(e.facing * 11, e.h * 0.38);
      ctx.stroke();

      // ── Gun ──
      if (!e.bomber) {
        ctx.fillStyle = '#666';
        ctx.fillRect(e.facing * 11, e.h * 0.36 - 2, e.facing * 12, 3);
      }

      // ── Head (3D radial gradient) ──
      let headR = e.w * 0.32;
      ctx.fillStyle = (e.hit > 0) ? '#fff' : makeHeadGradient(ctx, 0, e.h * 0.2, headR, eSkin);
      ctx.beginPath();
      ctx.arc(0, e.h * 0.2, headR, 0, Math.PI * 2);
      ctx.fill();
      // Specular highlight on head
      if (e.hit <= 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(-headR * 0.3, e.h * 0.2 - headR * 0.3, headR * 0.28, 0, Math.PI * 2);
        ctx.fill();
      }

      // ── Bandana/headgear ──
      ctx.fillStyle = eColor;
      ctx.beginPath();
      ctx.arc(0, e.h * 0.2 - 2, headR, Math.PI, Math.PI * 2);
      ctx.fill();

      // Eye
      ctx.fillStyle = '#fff';
      let eeX = e.facing > 0 ? 2 : -5;
      ctx.beginPath();
      ctx.ellipse(eeX, e.h * 0.19, 2.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(eeX + e.facing, e.h * 0.19, 1.2, 0, Math.PI * 2);
      ctx.fill();

      // Angry eyebrow
      ctx.strokeStyle = eColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(eeX - 3, e.h * 0.14 + (e.facing > 0 ? 2 : 0));
      ctx.lineTo(eeX + 3, e.h * 0.14 + (e.facing > 0 ? 0 : 2));
      ctx.stroke();

      // Health bar
      if (e.health < e.maxHealth) {
        ctx.fillStyle = '#333';
        ctx.fillRect(-e.w / 2, -12, e.w, 4);
        ctx.fillStyle = e.color;
        ctx.fillRect(-e.w / 2, -12, e.w * (e.health / e.maxHealth), 4);
      }

      // Bomber warning - blinking vest
      if (e.bomber) {
        let blink = Math.sin(Date.now() * 0.015) > 0;
        ctx.fillStyle = blink ? '#ff006e' : '#aa0044';
        ctx.fillRect(-tw / 2 + 2, e.h * 0.35, tw - 4, 8);
        if (blink) {
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(0, e.h * 0.39, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    ctx.restore();
  });

  // Players
  if (state === 'playing') {
    drawPlayer(player);
    if (player2) drawPlayer(player2);

    // P1/P2 labels in co-op, with YOU indicator in online
    if (coopMode) {
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      let p1IsLocal = !onlineMode || isHost;
      let p2IsLocal = onlineMode && isClient;
      if (player.alive) {
        ctx.fillStyle = p1IsLocal ? '#ffe66d' : player.bodyColor;
        ctx.fillText(p1IsLocal ? 'YOU' : 'P1', player.x, player.y - 10);
      }
      if (player2 && player2.alive) {
        ctx.fillStyle = p2IsLocal ? '#ffe66d' : player2.bodyColor;
        ctx.fillText(p2IsLocal ? 'YOU' : 'P2', player2.x, player2.y - 10);
      }
    }
  }

  // Floating texts
  floatingTexts.forEach(t => {
    let alpha = t.life / t.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = t.color;
    ctx.font = `bold ${t.size}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  });
  ctx.globalAlpha = 1;

  // ─── PVP LOW-HP DANGER VIGNETTE ───
  if (pvpMode && state === 'playing') {
    let localP = (onlineMode && isClient) ? player2 : player;
    if (localP && localP.alive && localP.health <= localP.maxHealth * 0.3) {
      let pulse = 0.12 + Math.sin(Date.now() * 0.008) * 0.08;
      let vgrad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.width * 0.25,
                                            canvas.width / 2, canvas.height / 2, canvas.width * 0.7);
      vgrad.addColorStop(0, 'rgba(0,0,0,0)');
      vgrad.addColorStop(1, `rgba(200,0,0,${pulse})`);
      ctx.fillStyle = vgrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ─── HUD ───
  // P1 Health
  let hudBarW = coopMode ? 130 : 150;
  ctx.fillStyle = '#333';
  ctx.fillRect(20, 15, hudBarW, 14);
  let p1hp = player.alive ? player.health : 0;
  ctx.fillStyle = p1hp > 2 ? '#2ecc71' : p1hp > 1 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(20, 15, hudBarW * (p1hp / player.maxHealth), 14);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 15, hudBarW, 14);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  let p1Label = coopMode ? ((onlineMode && isHost) ? 'YOU' : (onlineMode && isClient) ? 'OPP' : 'P1') : 'HP';
  ctx.fillText(`${p1Label} ${p1hp}/${player.maxHealth}`, 20 + hudBarW / 2, 26);
  // P1 Regen indicator
  if (player.alive && player.lastHitTimer > 240 && player.health < player.maxHealth) {
    ctx.fillStyle = '#2ecc71';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('+ REGEN', 20 + hudBarW + 5, 26);
  }

  // P1 Shield energy bar
  ctx.fillStyle = '#333';
  ctx.fillRect(20, 32, hudBarW, 8);
  let hudShieldRatio = player.shieldEnergy / player.maxShieldEnergy;
  ctx.fillStyle = hudShieldRatio > 0.3 ? '#66bbff' : '#ff6666';
  ctx.fillRect(20, 32, hudBarW * hudShieldRatio, 8);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 32, hudBarW, 8);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHIELD', 20 + hudBarW / 2, 39);

  // P1 Ammo
  ctx.textAlign = 'left';

  ctx.fillStyle = player.reloading ? '#f39c12' : '#fff';

  ctx.font = 'bold 12px monospace';

  // P1 dead indicator
  if (coopMode && !player.alive) {

    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DEAD', 20, 84);

  // P2 HUD (co-op only)
  if (coopMode && player2) {
    let p2x = canvas.width - 20 - hudBarW;
    // P2 Health
    ctx.fillStyle = '#333';
    ctx.fillRect(p2x, 15, hudBarW, 14);
    let p2hp = player2.alive ? player2.health : 0;
    ctx.fillStyle = p2hp > 2 ? '#2ecc71' : p2hp > 1 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(p2x, 15, hudBarW * (p2hp / player2.maxHealth), 14);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(p2x, 15, hudBarW, 14);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    let p2Label = (onlineMode && isClient) ? 'YOU' : (onlineMode && isHost) ? 'OPP' : 'P2';
    ctx.fillText(`${p2Label} ${p2hp}/${player2.maxHealth}`, p2x + hudBarW / 2, 26);
    // P2 Shield
    ctx.fillStyle = '#333';
    ctx.fillRect(p2x, 32, hudBarW, 8);
    let p2ShieldRatio = player2.shieldEnergy / player2.maxShieldEnergy;
    ctx.fillStyle = p2ShieldRatio > 0.3 ? '#66bbff' : '#ff6666';
    ctx.fillRect(p2x, 32, hudBarW * p2ShieldRatio, 8);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(p2x, 32, hudBarW, 8);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SHIELD', p2x + hudBarW / 2, 39);
    // P2 Ammo
    ctx.textAlign = 'right';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = player2.reloading ? '#f39c12' : '#fff';
    let p2AmmoText = player2.reloading ? `[RELOADING...]` : `${weapons[player2.weapon].name}: ${player2.ammo}/${player2.maxAmmo}`;
    ctx.fillText(p2AmmoText, canvas.width - 20, 55);
    // P2 Grenade count + Lives
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = player2.grenadeCount > 0 ? '#ff9800' : '#555';
    ctx.textAlign = 'right';
    ctx.fillText(`G: ${player2.grenadeCount}`, canvas.width - 20, 70);
    if (!pvpMode) {
      ctx.fillStyle = player2.lives > 1 ? '#ffe66d' : '#e74c3c';
      ctx.fillText(`♥ ${player2.lives}`, canvas.width - 70, 70);
    }
    // P2 dead indicator
    if (!player2.alive) {
      ctx.fillStyle = 'rgba(233,69,96,0.7)';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('DEAD', canvas.width - 20, 84);
    }
  }

  // Score
  if (coopMode) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#ffe66d';
    ctx.fillText(`${score}`, canvas.width / 2, 80);
    ctx.font = '10px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText(`BEST: ${highScore}`, canvas.width / 2, 92);
  } else {
    ctx.textAlign = 'right';
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#ffe66d';
    ctx.fillText(`${score}`, canvas.width - 20, 30);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText(`BEST: ${highScore}`, canvas.width - 20, 48);
  }

  // Wave / PvP score
  ctx.textAlign = 'center';
  if (pvpMode) {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#3498db';
    ctx.fillText(p1Kills, canvas.width / 2 - 40, 28);
    ctx.fillStyle = '#555';
    ctx.fillText('-', canvas.width / 2, 28);
    ctx.fillStyle = '#27ae60';
    ctx.fillText(p2Kills, canvas.width / 2 + 40, 28);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText(`FIRST TO ${KILLS_TO_WIN}`, canvas.width / 2, 44);
  } else {
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText(`LVL ${level} - WAVE ${wave}/${wavesPerLevel}`, canvas.width / 2, 28);

    // Kill streak
    if (killStreak >= 3) {
      ctx.fillStyle = '#ffe66d';
      ctx.font = 'bold 16px monospace';
      ctx.fillText(`${killStreak}x STREAK`, canvas.width / 2, 48);

  }

  // Slow-mo indicator
  if (slowMoTimer > 0) {
    ctx.fillStyle = '#c77dff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SLOW-MO: ${Math.ceil(slowMoTimer / 60)}s`, 20, coopMode ? 85 : 68);

  // Mute button (bottom-right)
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(MUTE_BTN.x, MUTE_BTN.y, MUTE_BTN.w, MUTE_BTN.h, 4);
  ctx.fill();
  ctx.fillStyle = muted ? '#e94560' : '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  if (muted) {
    ctx.fillText('\\', MUTE_BTN.x + MUTE_BTN.w / 2, MUTE_BTN.y + 16);
    ctx.fillStyle = 'rgba(233,69,96,0.5)';
    ctx.font = '10px monospace';
    ctx.fillText('OFF', MUTE_BTN.x + MUTE_BTN.w / 2, MUTE_BTN.y + MUTE_BTN.h + 10);
  } else {
    ctx.fillText(')))', MUTE_BTN.x + MUTE_BTN.w / 2, MUTE_BTN.y + 16);

  ctx.restore();

  // ─── MENUS ───
  if (state === 'menu') {

    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('GUNSLINGER', canvas.width / 2, 100);

    modes.forEach((mode, i) => {
      let my = 165 + i * 28;
      if (i === menuSelection) {
        ctx.fillStyle = '#ffe66d';
        ctx.fillText('> ' + mode + ' <', canvas.width / 2, my);
      } else {
        ctx.fillStyle = '#666';
        ctx.fillText(mode, canvas.width / 2, my);

    ctx.fillStyle = '#aaa';
    ctx.font = '12px monospace';

    if (menuSelection === 2) {

      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('FIRST TO 5 KILLS WINS!', canvas.width / 2, y);
      y += 16;
      ctx.fillStyle = '#3498db';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('P1 (Blue)', canvas.width / 2 - 160, y);
      ctx.fillStyle = '#27ae60';
      ctx.fillText('P2 (Green)', canvas.width / 2 + 160, y);
      y += 16;
      ctx.font = '11px monospace';
      const pvp1 = [['A / D','Move'],['W','Jump'],['Q','Dash'],['F','Shoot'],['E','Shield'],['R','Reload'],['G','Grenade']];
      const pvp2 = [['< / >','Move'],['Up','Jump'],["'",'Dash'],['/', 'Shoot'],['.','Shield'],[';','Reload'],[',','Grenade']];
      for (let i = 0; i < pvp1.length; i++) {
        ctx.fillStyle = '#4ecdc4'; ctx.textAlign = 'right';
        ctx.fillText(pvp1[i][0], canvas.width / 2 - 180, y);
        ctx.fillStyle = '#aaa'; ctx.textAlign = 'left';
        ctx.fillText(pvp1[i][1], canvas.width / 2 - 170, y);
        ctx.fillStyle = '#f39c12'; ctx.textAlign = 'right';
        ctx.fillText(pvp2[i][0], canvas.width / 2 + 150, y);
        ctx.fillStyle = '#aaa'; ctx.textAlign = 'left';
        ctx.fillText(pvp2[i][1], canvas.width / 2 + 160, y);
        y += 16;
      }
    } else if (menuSelection === 4) {

      ctx.fillStyle = '#e94560';

      ctx.fillText('FIRST TO 5 KILLS WINS!', canvas.width / 2, y);

      ctx.fillStyle = '#4ecdc4';
      ctx.font = '12px monospace';

        ['W / Space / Up', 'Jump (x2)'],
        ['Q / Shift', 'Dash (invincible)'],
        ['F / J / Z', 'Shoot'],
        ['E', 'Shield (blocks damage)'],
        ['R', 'Reload'],
        ['G', 'Grenade'],
        ['M', 'Mute / Unmute'],
      ];

        ctx.fillStyle = '#4ecdc4';
        ctx.textAlign = 'right';
        ctx.fillText(key, canvas.width / 2 - 15, y);
        ctx.fillStyle = '#aaa';
        ctx.textAlign = 'left';
        ctx.fillText(action, canvas.width / 2 + 15, y);
        y += 17;
      });
    } else if (menuSelection === 1) {
      // Local co-op controls
      ctx.fillStyle = '#3498db';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P1 (Blue)', canvas.width / 2 - 160, y);
      ctx.fillStyle = '#27ae60';
      ctx.fillText('P2 (Green)', canvas.width / 2 + 160, y);
      y += 18;
      ctx.font = '11px monospace';
      const p1Lines = [
        ['A / D', 'Move'],
        ['W', 'Jump (x2)'],
        ['Q', 'Dash'],
        ['F', 'Shoot'],
        ['E', 'Shield'],
        ['R', 'Reload'],
        ['G', 'Grenade'],

      const p2Lines = [
        ['< / >', 'Move'],
        ['Up', 'Jump (x2)'],
        ["'", 'Dash'],
        ['/', 'Shoot'],
        ['.', 'Shield'],
        [';', 'Reload'],
        [',', 'Grenade'],

      for (let i = 0; i < p1Lines.length; i++) {

        ctx.textAlign = 'right';
        ctx.fillText(p1Lines[i][0], canvas.width / 2 - 180, y);
        ctx.fillStyle = '#aaa';
        ctx.textAlign = 'left';
        ctx.fillText(p1Lines[i][1], canvas.width / 2 - 170, y);
        ctx.fillStyle = '#f39c12';
        ctx.textAlign = 'right';
        ctx.fillText(p2Lines[i][0], canvas.width / 2 + 150, y);
        ctx.fillStyle = '#aaa';
        ctx.textAlign = 'left';
        ctx.fillText(p2Lines[i][1], canvas.width / 2 + 160, y);
        y += 16;
      }
      ctx.font = '11px monospace';
      ctx.fillStyle = '#666';
      ctx.textAlign = 'center';
      ctx.fillText('M - Mute / Unmute', canvas.width / 2, y + 8);
    } else if (menuSelection === 3) {
      // Online co-op controls
      ctx.font = '12px monospace';
      ctx.fillStyle = '#4ecdc4';
      ctx.textAlign = 'center';
      ctx.fillText('Both players use the same keys', canvas.width / 2, y);
      ctx.fillText('on their own computer:', canvas.width / 2, y + 14);
      y += 34;
      const onlineLines = [
        ['A / D  or  Arrows', 'Move'],
        ['W / Space / Up', 'Jump (x2)'],
        ['Q', 'Dash (invincible)'],
        ['F', 'Shoot'],
        ['E', 'Shield (blocks damage)'],
        ['R', 'Reload'],
        ['G', 'Grenade'],
      ];
      onlineLines.forEach(([key, action]) => {
        ctx.fillStyle = '#4ecdc4';
        ctx.textAlign = 'right';
        ctx.fillText(key, canvas.width / 2 - 15, y);
        ctx.fillStyle = '#aaa';
        ctx.textAlign = 'left';
        ctx.fillText(action, canvas.width / 2 + 15, y);
        y += 17;
      });
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    let blink = Math.sin(Date.now() * 0.004) > 0;
    if (blink) ctx.fillText('Press ENTER to start', canvas.width / 2, 455);

    ctx.fillStyle = '#555';
    ctx.font = '11px monospace';
    ctx.fillText('Up/Down to select mode', canvas.width / 2, 472);

    if (highScore > 0) {
      ctx.fillStyle = '#888';
      ctx.font = '12px monospace';
      ctx.fillText(`High Score: ${highScore}`, canvas.width / 2, 488);
    }
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 44px monospace';
    ctx.fillText(coopMode ? 'WIPED OUT' : 'WASTED', canvas.width / 2, 180);

    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 28px monospace';
    ctx.fillText(`Score: ${score}`, canvas.width / 2, 240);

    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#4ecdc4';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, 275);
    }

    ctx.fillStyle = '#aaa';
    ctx.font = '16px monospace';
    ctx.fillText(`Wave: ${wave}`, canvas.width / 2, 310);

    if (onlineMode && isClient) {
      ctx.fillStyle = '#888';
      ctx.font = '16px monospace';
      let blink = Math.sin(Date.now() * 0.004) > 0;
      if (blink) ctx.fillText('Waiting for host...', canvas.width / 2, 370);
    } else {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px monospace';
      let blink = Math.sin(Date.now() * 0.004) > 0;
      if (blink) ctx.fillText('Press ENTER to retry', canvas.width / 2, 370);
    }
  }

  if (state === 'pvpIntro') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 40px monospace';
    ctx.fillText('1 v 1 DUEL', canvas.width / 2, 150);

    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 22px monospace';
    ctx.fillText(`FIRST TO ${KILLS_TO_WIN} KILLS`, canvas.width / 2, 200);

    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#3498db';
    ctx.fillText('P1', canvas.width / 2 - 60, 260);
    ctx.fillStyle = '#555';
    ctx.fillText('VS', canvas.width / 2, 260);
    ctx.fillStyle = '#27ae60';
    ctx.fillText('P2', canvas.width / 2 + 60, 260);

    let countdown = Math.ceil(levelIntroTimer / 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.fillText(`${countdown}`, canvas.width / 2, 340);

    ctx.fillStyle = '#888';
    ctx.font = '16px monospace';
    ctx.fillText('Get ready...', canvas.width / 2, 390);
  }

  if (state === 'pvpWin') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    let winColor = pvpWinner === 'P1' ? '#3498db' : '#27ae60';
    ctx.fillStyle = winColor;
    ctx.font = 'bold 48px monospace';
    let winText = pvpWinner + ' WINS!';
    if (onlineMode) {
      let iWon = (isHost && pvpWinner === 'P1') || (isClient && pvpWinner === 'P2');
      winText = iWon ? 'YOU WIN!' : 'YOU LOSE!';
      winColor = iWon ? '#ffe66d' : '#e94560';
      ctx.fillStyle = winColor;
    }
    ctx.fillText(winText, canvas.width / 2, 160);

    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 24px monospace';
    ctx.fillText(`${p1Kills} - ${p2Kills}`, canvas.width / 2, 220);

    ctx.fillStyle = '#aaa';
    ctx.font = '16px monospace';
    ctx.fillText('What a match!', canvas.width / 2, 270);

    if (onlineMode && isClient) {
      ctx.fillStyle = '#888';
      ctx.font = '16px monospace';
      let blink = Math.sin(Date.now() * 0.004) > 0;
      if (blink) ctx.fillText('Waiting for host...', canvas.width / 2, 340);
    } else {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px monospace';
      let blink = Math.sin(Date.now() * 0.004) > 0;
      if (blink) ctx.fillText('Press ENTER to play again', canvas.width / 2, 340);
      ctx.fillStyle = '#555';
      ctx.font = '14px monospace';
      ctx.fillText('Press ESC for menu', canvas.width / 2, 370);
    }

  if (state === 'levelIntro') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#888';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(`LEVEL ${level}`, canvas.width / 2, 160);

    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 40px monospace';

    ctx.font = '16px monospace';
    ctx.fillText(lvlIntro.subtitle, canvas.width / 2, 250);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 60px monospace';

    ctx.fillStyle = '#555';
    ctx.font = '14px monospace';
    ctx.fillText('Get ready...', canvas.width / 2, 390);

  if (state === 'levelComplete') {

    ctx.font = 'bold 44px monospace';

    ctx.font = 'bold 24px monospace';

      ctx.fillText(`Weapon Unlocked:`, canvas.width / 2, 280);

      ctx.font = 'bold 28px monospace';

      let blinkLC = Math.sin(Date.now() * 0.004) > 0;

      let blinkLC = Math.sin(Date.now() * 0.004) > 0;

    // Code input box
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(canvas.width / 2 - 130, 305, 260, 32);
    ctx.strokeStyle = '#4ecdc4';
    ctx.lineWidth = 2;
    ctx.strokeRect(canvas.width / 2 - 130, 305, 260, 32);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    let displayCode = unlockCodeInput + (Math.sin(Date.now() * 0.004) > 0 ? '_' : '');
    ctx.fillText(displayCode, canvas.width / 2, 326);

    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('Type code and press ENTER', canvas.width / 2, 360);

    ctx.fillStyle = '#555';
    ctx.font = '12px monospace';
    ctx.fillText('Press ESC for menu', canvas.width / 2, 400);

    // Score display
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(`SCORE: ${score}`, canvas.width / 2, 440);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, 462);
    }
  }

  // ─── ONLINE MENU SCREENS ───
  if (state === 'online-pvp-menu') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('ONLINE 1v1', canvas.width / 2, 120);

    ctx.font = 'bold 22px monospace';
    let pvpOpts = ['HOST GAME', 'JOIN GAME'];
    pvpOpts.forEach((opt, i) => {
      let oy = 200 + i * 40;
      if (i === onlineMenuSelection) {
        ctx.fillStyle = '#ffe66d';
        ctx.fillText('> ' + opt + ' <', canvas.width / 2, oy);
      } else {
        ctx.fillStyle = '#666';
        ctx.fillText(opt, canvas.width / 2, oy);
      }
    });

    ctx.fillStyle = '#555';
    ctx.font = '14px monospace';
    ctx.fillText('Press ESC to go back', canvas.width / 2, 340);
  }

  if (state === 'online-menu') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('ONLINE CO-OP', canvas.width / 2, 120);

    ctx.font = 'bold 22px monospace';
    let onlineOpts = ['HOST GAME', 'JOIN GAME'];
    onlineOpts.forEach((opt, i) => {
      let oy = 200 + i * 40;
      if (i === onlineMenuSelection) {
        ctx.fillStyle = '#ffe66d';
        ctx.fillText('> ' + opt + ' <', canvas.width / 2, oy);
      } else {
        ctx.fillStyle = '#666';
        ctx.fillText(opt, canvas.width / 2, oy);
      }
    });

    ctx.fillStyle = '#555';
    ctx.font = '14px monospace';
    ctx.fillText('Press ESC to go back', canvas.width / 2, 340);
  }

  if (state === 'online-host') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 28px monospace';
    ctx.fillText('ROOM CODE', canvas.width / 2, 120);

    ctx.font = 'bold 72px monospace';
    ctx.fillStyle = '#4ecdc4';
    ctx.fillText(roomCode || '...', canvas.width / 2, 220);

    ctx.fillStyle = '#aaa';
    ctx.font = '18px monospace';
    let hostBlink = Math.sin(Date.now() * 0.004) > 0;
    if (hostBlink || connectionStatus !== 'Waiting for player...') {
      ctx.fillText(connectionStatus, canvas.width / 2, 280);
    }

    ctx.fillStyle = '#666';
    ctx.font = '14px monospace';
    ctx.fillText('Share this code with your friend', canvas.width / 2, 330);
    ctx.fillText('Press ESC to cancel', canvas.width / 2, 360);
  }

  if (state === 'online-join') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 28px monospace';
    ctx.fillText('ENTER ROOM CODE', canvas.width / 2, 120);

    let boxW = 60, boxH = 70, gap = 12;
    let totalW = boxW * 4 + gap * 3;
    let startX = (canvas.width - totalW) / 2;
    for (let i = 0; i < 4; i++) {
      let bx = startX + i * (boxW + gap);
      let by = 160;
      ctx.fillStyle = i < roomCodeInput.length ? 'rgba(78,205,196,0.2)' : 'rgba(50,50,80,0.5)';
      ctx.strokeStyle = i === roomCodeInput.length ? '#ffe66d' : '#555';
      ctx.lineWidth = i === roomCodeInput.length ? 3 : 2;
      ctx.beginPath();
      ctx.roundRect(bx, by, boxW, boxH, 6);
      ctx.fill();
      ctx.stroke();
      if (i < roomCodeInput.length) {
        ctx.fillStyle = '#4ecdc4';
        ctx.font = 'bold 40px monospace';
        ctx.fillText(roomCodeInput[i], bx + boxW / 2, by + boxH / 2 + 14);
      }
    }

    if (connectionStatus) {
      ctx.fillStyle = connectionStatus.includes('Error') || connectionStatus.includes('not found') || connectionStatus.includes('failed') ? '#e94560' : '#aaa';
      ctx.font = '16px monospace';
      ctx.fillText(connectionStatus, canvas.width / 2, 290);
    }

    ctx.fillStyle = '#555';
    ctx.font = '14px monospace';
    ctx.fillText('Type the 4-letter code, then press ENTER', canvas.width / 2, 320);
    ctx.fillText('Press ESC to go back', canvas.width / 2, 345);
  }

  // ─── DISCONNECT OVERLAY ───
  if (disconnected) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 44px monospace';
    ctx.fillText('DISCONNECTED', canvas.width / 2, 220);

    ctx.fillStyle = '#aaa';
    ctx.font = '18px monospace';
    let secs = Math.ceil(disconnectTimer / 60);
    ctx.fillText('Returning to menu in ' + secs + '...', canvas.width / 2, 280);
  }

  // ─── ONLINE HUD INDICATOR ───
  if (onlineMode && (state === 'playing' || state === 'levelIntro' || state === 'pvpIntro')) {
    let connected = wsConnected;
    ctx.fillStyle = connected ? '#2ecc71' : '#e94560';
    ctx.beginPath();
    ctx.arc(8, 8, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(isHost ? 'HOST' : 'P2', 16, 11);
  }

  // ─── PAUSE MENU OVERLAY ───
  if (paused) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('PAUSED', canvas.width / 2, 180);

    let options = ['CONTINUE', 'QUIT TO MENU'];
    options.forEach((opt, i) => {
      let y = 250 + i * 50;
      if (i === pauseSelection) {
        ctx.fillStyle = '#ffe66d';
        ctx.font = 'bold 22px monospace';
        ctx.fillText('> ' + opt + ' <', canvas.width / 2, y);
      } else {
        ctx.fillStyle = '#888';
        ctx.font = '20px monospace';
        ctx.fillText(opt, canvas.width / 2, y);
      }
    });

    ctx.fillStyle = '#555';
    ctx.font = '14px monospace';
    ctx.fillText('Press ESC to resume', canvas.width / 2, 370);
  }

  // ─── VERSION NUMBER ───
  ctx.fillStyle = '#333';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(GAME_VERSION, 4, canvas.height - 4);
}

// ─── TAB VISIBILITY: pause music when switching tabs ───
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    if (audioCtx && musicGain) musicGain.gain.setValueAtTime(0, audioCtx.currentTime);
  } else {
    if (audioCtx && musicGain && !muted) musicGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  }
});

// ─── GAME LOOP (fixed timestep @ 60Hz) ───
let lastFrameTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 90; // 1.5x game speed

function gameLoop(timestamp) {
  if (lastFrameTime === 0) { lastFrameTime = timestamp; }
  let elapsed = timestamp - lastFrameTime;
  lastFrameTime = timestamp;
  if (elapsed > 100) elapsed = 100; // cap to prevent spiral on tab-switch
  accumulator += elapsed;
  while (accumulator >= FIXED_DT) {
    update();
    updateMusic();
    accumulator -= FIXED_DT;
  }
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
  </script>
